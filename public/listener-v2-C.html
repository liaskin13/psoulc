<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>PSC — THE SIGNAL — Listener V2-C</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #050505;
  --text-primary: #f0ede8;
  --text-secondary: #3a3a3a;
  --text-dim: #202020;
  --sep: #181818;
  --sep-light: #0d0d0d;
  --font-ui: 'Chakra Petch', monospace;
  --font-logo: 'Comfortaa', sans-serif;
}
html, body { width: 390px; height: 844px; overflow: hidden; background: var(--void); font-family: var(--font-ui); color: var(--text-primary); }
#app { width: 390px; height: 844px; display: grid; grid-template-rows: 44px 1fr 80px; background: var(--void); overflow: hidden; }

/* TOP BAR */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px; border-bottom: 1px solid var(--sep);
  background: rgba(5,5,5,0.97); z-index: 10;
}
.wordmark { font-family: var(--font-logo); font-weight: 700; font-size: 11px; letter-spacing: 0.03em; }
.wordmark .soul { font-size: 12px; }
.vault-tabs { display: flex; gap: 14px; }
.vault-tab { font-size: 8px; letter-spacing: 0.45em; text-transform: uppercase; color: var(--text-dim); cursor: pointer; padding-bottom: 1px; border-bottom: 1px solid transparent; }
.vault-tab.active { color: var(--text-primary); border-bottom-color: rgba(240,237,232,0.4); }

/* TRACKLIST */
#tracklist { overflow-y: auto; scrollbar-width: none; position: relative; }
#tracklist::-webkit-scrollbar { display: none; }

.track-row {
  display: grid; grid-template-columns: 56px 1fr auto;
  align-items: stretch; min-height: 72px;
  border-bottom: 1px solid var(--sep-light);
  cursor: pointer; position: relative;
  background: var(--void); transition: background 0.15s;
}
.track-row:active { background: #080808; }
.track-row.playing {
  background: #070707;
  border-left: 1px solid var(--track-color, rgba(240,237,232,0.2));
}
/* color bleed on playing row */
.track-row.playing::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 48px;
  background: linear-gradient(90deg, var(--track-glow, rgba(210,105,30,0.08)) 0%, transparent 100%);
  pointer-events: none;
}

/* Scroll-reveal: title slides in colored on hover */
.track-row:hover .track-title-text { transform: translateX(0); opacity: 1; }

.wave-thumb { display: flex; align-items: center; justify-content: center; padding: 10px 8px; }
.wave-thumb canvas { display: block; border-radius: 1px; }

.track-meta {
  display: flex; flex-direction: column; justify-content: center;
  gap: 5px; padding: 0 10px 0 4px; overflow: hidden;
}
.track-title-text {
  font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.2s;
}
/* Playing: title takes track color. On hover: any title reveals in its color */
.track-row.playing .track-title-text { color: var(--track-color, var(--text-primary)); }
.track-row:not(.playing):hover .track-title-text { color: var(--track-color, var(--text-primary)); }
.track-sub { font-size: 9px; color: var(--text-secondary); letter-spacing: 0.08em; display: flex; gap: 8px; }
.track-vault-label { font-size: 7px; color: var(--text-dim); letter-spacing: 0.45em; text-transform: uppercase; }

.cue-cluster { display: flex; flex-direction: column; justify-content: center; gap: 4px; padding: 0 12px 0 4px; }
.cue-dot-row { display: flex; gap: 3px; }
.cue-dot { width: 5px; height: 5px; border-radius: 50%; }

/* STUDER BAR */
#studer {
  background: #040404; border-top: 1px solid #111;
  display: flex; flex-direction: column; justify-content: center;
  padding: 10px 16px 16px; gap: 8px; z-index: 10;
}
.studer-track { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.studer-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
  color: var(--playing-color, var(--text-primary));
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  transition: color 0.3s;
}
.studer-artist { font-size: 8px; color: var(--text-secondary); letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; }
.studer-timeline { position: relative; padding-bottom: 14px; }
.studer-progress { height: 1px; background: #1c1c1c; border-radius: 1px; overflow: hidden; }
.studer-fill { height: 100%; width: 37%; border-radius: 1px; transition: background 0.3s; }
.studer-times { display: flex; justify-content: space-between; position: absolute; bottom: 0; left: 0; right: 0; }
.studer-time { font-size: 8px; color: var(--text-dim); letter-spacing: 0.04em; }
.studer-btns { display: flex; align-items: center; justify-content: center; gap: 28px; font-size: 14px; color: var(--text-primary); }
.studer-btn-play { font-size: 18px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span class="wordmark">pleasant<span class="soul">soul</span>collective</span>
    <div class="vault-tabs">
      <span class="vault-tab active">MIXES</span>
      <span class="vault-tab">ORIGINALS</span>
      <span class="vault-tab">LIVE</span>
    </div>
  </div>

  <!-- TRACKLIST -->
  <div id="tracklist"></div>

  <!-- STUDER TRANSPORT BAR -->
  <div id="studer">
    <div class="studer-track">
      <span class="studer-title" id="studer-title">Late Night Frequency Vol.4</span>
      <span class="studer-artist">Soul Pleasant</span>
    </div>
    <div class="studer-timeline">
      <div class="studer-progress"><div class="studer-fill" id="studer-fill"></div></div>
      <div class="studer-times">
        <span class="studer-time">34:12</span>
        <span class="studer-time">1:28:44</span>
      </div>
    </div>
    <div class="studer-btns">
      <span>⏮</span>
      <span class="studer-btn-play">⏸</span>
      <span>⏭</span>
    </div>
  </div>
</div>

<script>
const SERATO = ['#e52020','#e56020','#e5a020','#14dc14','#00c8dc','#1464dc','#8c14dc','#e5e5e5'];

const tracks = [
  { title:'Late Night Frequency Vol.4',  bpm:'118', dur:'1:28:44', vault:'Soul Pleasant Mixes', playing:true, color:'#d2691e', cues:8,
    energy:t=>t<.1?.12+t*1.8:t<.25?.3+(t-.1)*3.6:t<.4?.84+.14*Math.sin(t*110):t<.55?.28+.12*Math.sin(t*75):t<.65?.32+(t-.55)*5:t<.82?.9+.08*Math.sin(t*140):.88*(1-(t-.82)*4.8) },
  { title:'Midnight Transmission',       bpm:'124', dur:'58:32', vault:'Soul Pleasant Mixes', color:'#8890a0', cues:0,
    energy:t=>.28+.48*Math.sin(t*Math.PI*2.3)*(t<.78?1:1-(t-.78)*4.5) },
  { title:'Deep Archive 001',            bpm:'96',  dur:'1:12:08', vault:'Soul Pleasant Mixes', color:'#e56020', cues:6,
    energy:t=>t<.15?.18+t*3.5:t<.42?.65+.28*Math.sin(t*85):t<.58?.22:.78+.18*Math.sin(t*60) },
  { title:'Carbon Frequency',            bpm:'132', dur:'44:18', vault:'Soul Pleasant Mixes', color:'#667685', cues:2,
    energy:t=>.6+.35*Math.abs(Math.sin(t*Math.PI*5)) },
  { title:'Signal Lost (Repress)',       bpm:'140', dur:'52:08', vault:'Soul Pleasant Mixes', color:'#8c14dc', cues:8,
    energy:t=>t<.08?.1+t*2.2:t<.22?.28+(t-.08)*4:t<.38?.85+.12*Math.sin(t*100):t<.52?.25:.82+.15*Math.sin(t*55) },
  { title:'The Muse Sessions',           bpm:'98',  dur:'1:04:55', vault:'Original Music', color:'#c9847a', cues:4,
    energy:t=>.22+.42*Math.sin(t*Math.PI*1.6)*(t<.88?1:1-(t-.88)*8) },
  { title:'Pressure Test Vol.2',         bpm:'128', dur:'1:16:22', vault:'Soul Pleasant Mixes', color:'#e5a020', cues:5,
    energy:t=>.55+.4*Math.abs(Math.sin(t*Math.PI*4.8)) },
  { title:'Black Market Audio',          bpm:'110', dur:'38:44', vault:'Live Sets', color:'#14dc14', cues:3,
    energy:t=>t<.12?.15+t*4.2:t<.38?.64+.3*Math.sin(t*92):t<.5?.3:t<.72?.76+.2*Math.sin(t*48):.76*(1-(t-.72)*3.2) },
];

function noise3(x,s){return(Math.sin(x*s*7.3+1.1)+Math.sin(x*s*13.7+2.2)+Math.sin(x*s*3.1+.8))/3;}

function drawMiniWave(canvas, energyFn, dim) {
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height, MID=H/2;
  ctx.clearRect(0,0,W,H);
  const BH=H*.42, MH=H*.26, HH=H*.14;
  for(let px=0;px<W;px++){
    const t=px/W, e=Math.max(0,Math.min(1,energyFn(t)));
    const bn=.6+.4*Math.abs(noise3(t,.8));
    const mn=.5+.5*Math.abs(noise3(t,2.1));
    const hn=.3+.7*Math.abs(noise3(t,5.8));
    const d=dim;
    const bassH=e*BH*bn, midH=e*MH*mn*.85, highH=e*HH*hn*.7;
    const bg=ctx.createLinearGradient(px,MID-bassH,px,MID+bassH);
    bg.addColorStop(0,`rgb(${Math.floor(130*e*d)},${Math.floor(55*e*d)},${Math.floor(14*e*d)})`);
    bg.addColorStop(.5,`rgb(${Math.floor(80*e*d)},${Math.floor(38*e*d)},${Math.floor(7*e*d)})`);
    bg.addColorStop(1,`rgb(${Math.floor(130*e*d)},${Math.floor(55*e*d)},${Math.floor(14*e*d)})`);
    ctx.fillStyle=bg; ctx.fillRect(px,MID-bassH,1,bassH*2);
    const mv=Math.floor(58*d);
    ctx.fillStyle=`rgb(${mv},${mv},${mv})`; ctx.fillRect(px,MID-midH,1,midH*2);
    if(hn>.55&&e>.3){const hv=Math.floor(195*d);ctx.fillStyle=`rgb(${hv},${hv},${hv})`;ctx.fillRect(px,MID-highH,1,highH*2);}
  }
}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}

const tracklistEl = document.getElementById('tracklist');

tracks.forEach((track, i) => {
  const row = document.createElement('div');
  row.className='track-row'+(track.playing?' playing':'');
  const rgb=hexToRgb(track.color);
  row.style.cssText=`--track-color:${track.color};--track-glow:rgba(${rgb.r},${rgb.g},${rgb.b},0.09);`;
  if(track.playing)row.style.borderLeftColor=track.color;

  // Wave thumb
  const waveWrap=document.createElement('div');
  waveWrap.className='wave-thumb';
  const c=document.createElement('canvas');
  c.width=80;c.height=80;
  c.style.cssText='width:40px;height:40px;display:block;';
  drawMiniWave(c,track.energy,track.playing?1:.52);
  waveWrap.appendChild(c);

  // Meta
  const meta=document.createElement('div');
  meta.className='track-meta';
  meta.innerHTML=`<div class="track-title-text">${track.title}</div><div class="track-sub"><span>${track.bpm} BPM</span><span>${track.dur}</span></div><div class="track-vault-label">${track.vault}</div>`;

  // Cue cluster (dots indicating cue count)
  const cluster=document.createElement('div');
  cluster.className='cue-cluster';
  if(track.cues>0){
    const count=Math.min(track.cues,8);
    const r1=document.createElement('div');r1.className='cue-dot-row';
    const r2=document.createElement('div');r2.className='cue-dot-row';
    for(let j=0;j<Math.min(count,4);j++){
      const d=document.createElement('div');
      d.className='cue-dot';
      d.style.cssText=`background:${SERATO[j]};opacity:${j<count?'.9':'.15'};`;
      r1.appendChild(d);
    }
    if(count>4){
      for(let j=4;j<count;j++){
        const d=document.createElement('div');
        d.className='cue-dot';
        d.style.cssText=`background:${SERATO[j]};opacity:.9;`;
        r2.appendChild(d);
      }
    }
    cluster.appendChild(r1);
    if(count>4)cluster.appendChild(r2);
  }

  row.appendChild(waveWrap);
  row.appendChild(meta);
  row.appendChild(cluster);
  tracklistEl.appendChild(row);
});

// Studer bar — color-matched to playing track
const playing = tracks.find(t=>t.playing);
if(playing){
  document.getElementById('studer').style.setProperty('--playing-color', playing.color);
  document.getElementById('studer-fill').style.background=playing.color;
}
</script>
</body>
</html>
