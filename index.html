    <script>
      // Suppress third-party extension errors before they block execution
      window.addEventListener('error', (e) => {
        if (e.filename && (e.filename.includes('share-modal') || e.filename.includes('extension'))) {
          e.preventDefault();
          return true;
        }
      }, true);
    </script>
