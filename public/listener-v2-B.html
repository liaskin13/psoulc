<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>PSC — THE BOOTH — Listener V2-B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #050505;
  --text-primary: #f0ede8;
  --text-secondary: #3a3a3a;
  --text-dim: #222;
  --sep: #181818;
  --sep-light: #0e0e0e;
  --font-ui: 'Chakra Petch', monospace;
  --font-logo: 'Comfortaa', sans-serif;
}
html, body { width: 390px; height: 844px; overflow: hidden; background: var(--void); font-family: var(--font-ui); color: var(--text-primary); }
#app { width: 390px; height: 844px; display: grid; grid-template-rows: 56px 296px 60px 1fr 60px; background: var(--void); overflow: hidden; }

/* HEADER */
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; border-bottom: 1px solid var(--sep);
  background: var(--void);
}
.header-meta { display: flex; flex-direction: column; gap: 4px; flex: 1; overflow: hidden; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-sub { font-size: 8px; color: var(--text-secondary); letter-spacing: 0.3em; text-transform: uppercase; }
.close-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 1px solid #1a1a1a; border-radius: 2px; font-size: 12px; color: var(--text-secondary); cursor: pointer; flex-shrink: 0; margin-left: 12px; }

/* HERO WAVEFORM SECTION */
#hero {
  position: relative; background: var(--void); overflow: hidden;
  border-bottom: 1px solid var(--sep);
}

/* CUE TRIANGLES ROW */
#cue-row {
  position: absolute; top: 0; left: 0; right: 0; height: 24px;
  z-index: 8; pointer-events: none;
}
.cue-pin {
  position: absolute; top: 4px;
  display: flex; flex-direction: column; align-items: center;
  transform: translateX(-50%); cursor: pointer; pointer-events: all;
}
.cue-triangle {
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 11px solid var(--cue-color);
  filter: drop-shadow(0 0 4px var(--cue-color));
}
.voice-badge {
  position: absolute; top: -8px; right: -8px;
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 6px; color: rgba(255,255,255,0.7);
}

/* WAVEFORM CANVAS */
#waveform-canvas { display: block; width: 390px; height: 210px; position: absolute; top: 24px; left: 0; }

/* PLAYHEAD */
#playhead {
  position: absolute; top: 24px; bottom: 36px; left: 37%;
  width: 1px; background: rgba(240,237,232,0.75); z-index: 6;
  pointer-events: none;
}
#playhead::before {
  content: ''; position: absolute; top: 0; left: -3px;
  width: 7px; height: 7px;
  background: var(--text-primary);
  clip-path: polygon(50% 100%, 0 0, 100% 0);
}

/* GESTURE LABELS */
#gesture-labels {
  position: absolute; bottom: 36px; left: 0; right: 0; height: 20px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px; pointer-events: none; z-index: 5;
}
.gesture-hint { font-size: 7px; color: #1e1e1e; letter-spacing: 0.3em; text-transform: uppercase; }

/* PROGRESS BAR */
#progress-bar-wrap {
  position: absolute; bottom: 16px; left: 14px; right: 14px;
  height: 1px; background: #1a1a1a; z-index: 6;
}
#progress-fill { height: 100%; width: 37%; background: rgba(240,237,232,0.5); }
#progress-times {
  position: absolute; top: 6px; left: 0; right: 0;
  display: flex; justify-content: space-between;
}
.prog-time { font-size: 8px; color: #2a2a2a; letter-spacing: 0.04em; }

/* TRANSPORT */
#transport {
  display: flex; align-items: center; justify-content: center;
  gap: 32px; font-size: 15px; color: var(--text-primary);
  border-bottom: 1px solid var(--sep);
  background: var(--void);
}
.t-play { font-size: 22px; }
.t-skip-label { font-size: 7px; color: var(--text-dim); letter-spacing: 0.3em; display: flex; flex-direction: column; align-items: center; gap: 3px; }

/* MINI TRACKLIST */
#mini-list { overflow-y: auto; scrollbar-width: none; background: var(--void); }
#mini-list::-webkit-scrollbar { display: none; }

.mini-row {
  display: grid; grid-template-columns: 52px 1fr 64px;
  align-items: stretch; height: 64px;
  border-bottom: 1px solid var(--sep-light);
  cursor: pointer; position: relative;
}
.mini-row.active { background: #070707; }
.mini-row.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 1px; background: rgba(240,237,232,0.3); }
.mini-num { display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; }
.mini-meta { display: flex; flex-direction: column; justify-content: center; gap: 4px; padding: 0 8px; overflow: hidden; }
.mini-title { font-size: 11px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-title.playing { color: var(--track-color, var(--text-primary)); }
.mini-sub { font-size: 9px; color: var(--text-secondary); letter-spacing: 0.08em; }
.mini-wave { padding: 8px 8px 8px 0; }
.mini-wave canvas { display: block; width: 100%; height: 100%; border-radius: 1px; }

/* BOTTOM NAV */
#bottom-nav {
  height: 60px; display: flex; align-items: center; justify-content: space-around;
  border-top: 1px solid var(--sep); background: var(--void); padding-bottom: 4px;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.nav-label { font-size: 8px; font-weight: 500; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text-dim); }
.nav-item.active .nav-label { color: var(--text-primary); }
.nav-dot { width: 3px; height: 3px; background: var(--text-primary); border-radius: 50%; opacity: 0; }
.nav-item.active .nav-dot { opacity: 1; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="header-meta">
      <div class="header-title">Elevated Dreams Vol. 3</div>
      <div class="header-sub">Soul Pleasant &nbsp;·&nbsp; Mixes &nbsp;·&nbsp; 128 BPM</div>
    </div>
    <div class="close-btn">✕</div>
  </div>

  <!-- HERO WAVEFORM SECTION -->
  <div id="hero">
    <div id="cue-row"></div>
    <canvas id="waveform-canvas" width="390" height="210"></canvas>
    <div id="playhead"></div>
    <div id="gesture-labels">
      <span class="gesture-hint">← hold  −30s</span>
      <span class="gesture-hint">tap  +10s →</span>
    </div>
    <div id="progress-bar-wrap">
      <div id="progress-fill"></div>
      <div id="progress-times">
        <span class="prog-time">14:32</span>
        <span class="prog-time">38:47</span>
      </div>
    </div>
  </div>

  <!-- TRANSPORT -->
  <div id="transport">
    <div class="t-skip-label"><span>⏮</span><span>PREV</span></div>
    <span class="t-play">⏸</span>
    <div class="t-skip-label"><span>⏭</span><span>NEXT</span></div>
  </div>

  <!-- MINI TRACKLIST -->
  <div id="mini-list"></div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <div class="nav-item">
      <div class="nav-dot"></div>
      <div class="nav-label">VAULTS</div>
    </div>
    <div class="nav-item active">
      <div class="nav-dot"></div>
      <div class="nav-label">NOW</div>
    </div>
    <div class="nav-item">
      <div class="nav-dot"></div>
      <div class="nav-label">PROFILE</div>
    </div>
  </div>
</div>

<script>
const SERATO = ['#e52020','#e56020','#e5a020','#14dc14','#00c8dc','#1464dc','#8c14dc','#e5e5e5'];

// Cue points: position on waveform (0-1), has voice note badge?
const CUE_POINTS = [
  {pos:.06,voice:false},{pos:.18,voice:true},{pos:.34,voice:false},
  {pos:.47,voice:false},{pos:.58,voice:true},{pos:.68,voice:false},
  {pos:.79,voice:true},{pos:.91,voice:false}
];

const tracks = [
  { title:'Elevated Dreams Vol. 3',  bpm:'128', dur:'38:47', playing:true, color:'#d2691e',
    energy:t=>t<.08?.12+t*1.9:t<.22?.38+(t-.08)*3.8:t<.38?.9+.1*Math.sin(t*120):t<.52?.28+.12*Math.sin(t*80):t<.62?.38+(t-.52)*4.2:t<.80?.9+.08*Math.sin(t*150):.9*(1-(t-.8)*4.5) },
  { title:'Late Night Archives',     bpm:'132', dur:'44:12', color:'#8890a0', energy:t=>.3+.5*Math.sin(t*Math.PI*2.4)*(t<.75?1:1-(t-.75)*4) },
  { title:'Soul Circuit',            bpm:'124', dur:'51:08', color:'#9632dc', energy:t=>.2+.6*Math.abs(Math.sin(t*Math.PI*3.1)) },
  { title:'The Booth Sessions',      bpm:'126', dur:'1:02:33', color:'#00c8dc', energy:t=>.6+.35*Math.abs(Math.sin(t*Math.PI*5.4)) },
  { title:'Warm Static',             bpm:'138', dur:'48:20', color:'#c9847a', energy:t=>.25+.5*Math.sin(t*Math.PI*2)*(t<.8?1:1-(t-.8)*5) },
];

function noise3(x,s){return(Math.sin(x*s*7.3+1.1)+Math.sin(x*s*13.7+2.2)+Math.sin(x*s*3.1+.8))/3;}

// ─── HERO WAVEFORM with prismatic peaks ───
function drawHeroWave(canvas, energyFn) {
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height, MID=H/2;
  ctx.clearRect(0,0,W,H);
  const BH=H*.38, MH=H*.24, HH=H*.14, PH=H*.10;

  for(let px=0;px<W;px++){
    const t=px/W;
    const sampleT = t; // full track visible
    const e=Math.max(0,Math.min(1,energyFn(sampleT)));
    const isPlayed = t < 0.37;
    const dim = isPlayed ? 0.55 : 1.0;

    const bn=.65+.35*Math.abs(noise3(t,.8));
    const mn=.5+.5*Math.abs(noise3(t,2.1));
    const hn=.3+.7*Math.abs(noise3(t,5.8));

    const bassH=e*BH*bn;
    const midH=e*MH*mn*.85;
    const highH=e*HH*hn*.7;

    // BASS — warm brown/copper
    const bg=ctx.createLinearGradient(px,MID-bassH,px,MID+bassH);
    bg.addColorStop(0,`rgb(${Math.floor(138*e*dim)},${Math.floor(58*e*dim)},${Math.floor(16*e*dim)})`);
    bg.addColorStop(.5,`rgb(${Math.floor(90*e*dim)},${Math.floor(42*e*dim)},${Math.floor(8*e*dim)})`);
    bg.addColorStop(1,`rgb(${Math.floor(138*e*dim)},${Math.floor(58*e*dim)},${Math.floor(16*e*dim)})`);
    ctx.fillStyle=bg; ctx.fillRect(px,MID-bassH,1,bassH*2);

    // MID — charcoal
    const mv=Math.floor(58*dim);
    ctx.fillStyle=`rgb(${mv},${mv},${mv})`; ctx.fillRect(px,MID-midH,1,midH*2);

    // HIGHS — silver
    if(hn>.5&&e>.28){
      const hv=Math.floor(210*dim);
      ctx.fillStyle=`rgb(${hv},${hv},${hv})`; ctx.fillRect(px,MID-highH,1,highH*2);
    }

    // PRISMATIC PEAKS — cyan→violet→rose gold→white shimmer at tips
    if(hn>.6&&e>.5){
      const prismH=highH*0.85;
      const tipY=MID-highH-prismH;
      const pg=ctx.createLinearGradient(px,tipY+prismH,px,tipY);
      pg.addColorStop(0,`rgba(0,200,220,${.5*dim})`);      // cyan — base of prism
      pg.addColorStop(.35,`rgba(140,20,220,${.6*dim})`);   // violet
      pg.addColorStop(.65,`rgba(201,132,122,${.7*dim})`);  // rose gold
      pg.addColorStop(1,`rgba(255,255,255,${.85*dim})`);   // white shimmer tip
      ctx.fillStyle=pg; ctx.fillRect(px,tipY,1,prismH);
      // Mirror
      const btY=MID+highH;
      const pg2=ctx.createLinearGradient(px,btY+prismH,px,btY);
      pg2.addColorStop(0,`rgba(255,255,255,${.85*dim})`);
      pg2.addColorStop(.35,`rgba(201,132,122,${.7*dim})`);
      pg2.addColorStop(.65,`rgba(140,20,220,${.6*dim})`);
      pg2.addColorStop(1,`rgba(0,200,220,${.5*dim})`);
      ctx.fillStyle=pg2; ctx.fillRect(px,btY,1,prismH);
    }
  }
  // Center void line
  ctx.fillStyle='rgba(5,5,5,0.5)'; ctx.fillRect(0,MID-1,W,2);
}

// ─── MINI WAVEFORM ───
function drawMiniWave(canvas, energyFn, dim) {
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height, MID=H/2;
  ctx.clearRect(0,0,W,H);
  const BH=H*.42, MH=H*.26;
  for(let px=0;px<W;px++){
    const t=px/W, e=Math.max(0,Math.min(1,energyFn(t)));
    const bn=.6+.4*Math.abs(noise3(t,.8));
    const mn=.5+.5*Math.abs(noise3(t,2.1));
    const d=dim;
    const bassH=e*BH*bn, midH=e*MH*mn*.85;
    ctx.fillStyle=`rgb(${Math.floor(100*e*d)},${Math.floor(48*e*d)},${Math.floor(12*e*d)})`;
    ctx.fillRect(px,MID-bassH,1,bassH*2);
    const mv=Math.floor(52*d);
    ctx.fillStyle=`rgb(${mv},${mv},${mv})`; ctx.fillRect(px,MID-midH,1,midH*2);
  }
}

// ─── RENDER HERO ───
drawHeroWave(document.getElementById('waveform-canvas'), tracks[0].energy);

// ─── RENDER CUE TRIANGLES ───
const cueRow = document.getElementById('cue-row');
CUE_POINTS.forEach((cue,i)=>{
  const pin=document.createElement('div');
  pin.className='cue-pin';
  pin.style.cssText=`left:${cue.pos*100}%;--cue-color:${SERATO[i]};`;
  pin.innerHTML=`<div class="cue-triangle"></div>`;
  if(cue.voice){
    const badge=document.createElement('div');
    badge.className='voice-badge';
    badge.textContent='◉';
    pin.firstChild.style.position='relative';
    pin.firstChild.appendChild(badge);
  }
  cueRow.appendChild(pin);
});

// ─── RENDER MINI TRACKLIST ───
const miniList=document.getElementById('mini-list');
tracks.forEach((track,i)=>{
  const row=document.createElement('div');
  row.className='mini-row'+(track.playing?' active':'');
  if(track.playing)row.style.setProperty('--track-color',track.color);

  const numEl=document.createElement('div');
  numEl.className='mini-num';
  numEl.textContent=String(i+1).padStart(2,'0');

  const meta=document.createElement('div');
  meta.className='mini-meta';
  meta.innerHTML=`<div class="mini-title${track.playing?' playing':''}">${track.title}</div><div class="mini-sub">${track.bpm} BPM &nbsp;·&nbsp; ${track.dur}</div>`;

  const waveWrap=document.createElement('div');
  waveWrap.className='mini-wave';
  const c=document.createElement('canvas');
  c.width=128;c.height=96;
  c.style.cssText='width:64px;height:48px;display:block;';
  drawMiniWave(c,track.energy,track.playing?1:.5);
  waveWrap.appendChild(c);

  row.appendChild(numEl);row.appendChild(meta);row.appendChild(waveWrap);
  miniList.appendChild(row);
});
</script>
</body>
</html>
