<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC // Console</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ─── TOKENS ──────────────────────────────────── */
:root {
  --void:    #000000;
  --s1:      #080808;
  --s2:      #0e0e0e;
  --s3:      #141414;
  --b1:      #111111;
  --b2:      #1a1a1a;
  --tp:      #e8e4de;
  --ts:      #444444;
  --tm:      #222222;
  --id:      #ffb347;
  --id-dim:  rgba(255,179,71,0.08);
  --id-glow: 0 0 28px rgba(255,179,71,0.18);
  --red:     #cc2200;
  --fd:      'Syne', sans-serif;
  --fb:      'Syne', sans-serif;
  --fm:      'SF Mono','Monaco',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;border-radius:0;-webkit-font-smoothing:antialiased;}
html,body,#root{width:100vw;height:100vh;overflow:hidden;background:var(--void);color:var(--tp);font-family:var(--fd);}
body{cursor:none;}
::-webkit-scrollbar{width:1px;}
::-webkit-scrollbar-thumb{background:var(--b2);}

/* ─── LAYOUT ──────────────────────────────────── */
.console{display:flex;flex-direction:column;width:100vw;height:100vh;}
.rail{height:36px;min-height:36px;display:flex;align-items:center;gap:12px;padding:0 18px;background:var(--void);border-bottom:1px solid var(--b1);flex-shrink:0;position:relative;z-index:20;}
.main{display:flex;flex:1;min-height:0;overflow:hidden;}
.transport{height:60px;min-height:60px;display:flex;align-items:center;gap:10px;padding:0 18px;background:var(--void);border-top:1px solid var(--b1);flex-shrink:0;position:relative;z-index:20;}

/* ─── RAIL ────────────────────────────────────── */
.rail-mark{font-family:'Comfortaa',sans-serif;font-size:13px;font-weight:700;color:var(--id);letter-spacing:-0.01em;}
.r-sep{width:1px;height:14px;background:var(--b1);flex-shrink:0;}
.r-lbl{font-family:var(--fd);font-size:10px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--ts);}
.r-lbl.id{color:var(--id);opacity:0.75;}
.live-wrap{display:flex;align-items:center;gap:6px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:rp 1.6s ease-in-out infinite;flex-shrink:0;}
@keyframes rp{0%,100%{opacity:.2}50%{opacity:1}}
.r-bpm{font-family:var(--fm);font-size:14px;font-weight:700;color:var(--id);letter-spacing:0.05em;}
.r-clock{font-family:var(--fm);font-size:10px;color:var(--ts);}
.r-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.arch{font-size:9px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--id);color:var(--id);}
.mic-btn{width:24px;height:24px;border:1px solid var(--b2);background:transparent;color:var(--ts);cursor:none;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 100ms;}
.mic-btn:hover{border-color:var(--id);color:var(--id);}
.mic-btn.on{border-color:var(--id);color:var(--id);background:var(--id-dim);animation:rp .7s ease-in-out infinite;}

/* ─── BINS ────────────────────────────────────── */
.bins{width:200px;min-width:200px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.bins-accent{position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--id);opacity:.5;}
.bins-top{padding:14px 14px 10px 18px;display:flex;align-items:baseline;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--b1);}
.bins-label{font-size:9px;font-weight:600;letter-spacing:0.28em;text-transform:uppercase;color:var(--ts);}
.bins-count{font-family:var(--fm);font-size:9px;color:var(--tm);}
.bins-filters{display:flex;gap:0;border-bottom:1px solid var(--b1);flex-shrink:0;}
.fchip{flex:1;font-size:8px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:6px 0;text-align:center;color:var(--tm);cursor:none;border-right:1px solid var(--b1);transition:color 100ms;}
.fchip:last-child{border-right:none;}
.fchip.on{color:var(--id);}
/* vault rows (L) */
.vrow{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 18px;border-bottom:1px solid var(--b1);cursor:none;}
.vrow:hover{background:rgba(255,255,255,.015);}
.vrow.on{background:rgba(255,255,255,.025);}
.vdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.vname{font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;}
.vcnt{font-family:var(--fm);font-size:8px;color:var(--tm);margin-left:auto;}
.vdivider{padding:8px 14px 5px 18px;border-bottom:1px solid var(--b1);}
/* track rows */
.bins-list{flex:1;overflow-y:auto;}
.trow{display:flex;align-items:center;padding:0 14px 0 18px;height:38px;cursor:none;position:relative;transition:background 80ms;border-bottom:1px solid transparent;}
.trow:hover{background:rgba(255,255,255,.02);}
.trow.on{background:var(--id-dim);border-bottom-color:var(--b1);}
.trow-bar{position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--id);opacity:0;transition:opacity 80ms;}
.trow.on .trow-bar{opacity:1;}
.tr-n{font-family:var(--fm);font-size:8px;color:var(--tm);width:18px;flex-shrink:0;}
.tr-info{flex:1;min-width:0;}
.tr-title{font-size:12px;font-weight:500;letter-spacing:0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tp);transition:color 80ms;}
.trow.on .tr-title{color:var(--id);}
.tr-sub{font-size:9px;color:var(--ts);margin-top:1px;}
.tr-bpm{font-family:var(--fm);font-size:9px;color:var(--tm);flex-shrink:0;margin-left:8px;}
/* dp watermark */
.bins-wm{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-family:'Comfortaa',sans-serif;font-size:60px;font-weight:700;color:var(--tp);opacity:.016;pointer-events:none;user-select:none;letter-spacing:-.02em;}

/* ─── MONITOR ─────────────────────────────────── */
.monitor{flex:1;background:#000;display:flex;flex-direction:column;overflow:hidden;position:relative;}
/* dp texture behind monitor */
.dp-texture{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.dp-texture::before{content:'dp dp dp dp dp dp\A dp dp dp dp dp dp\A dp dp dp dp dp dp\A dp dp dp dp dp dp\A dp dp dp dp dp dp';font-family:'Comfortaa',sans-serif;font-size:48px;font-weight:700;white-space:pre;color:var(--tp);opacity:.014;line-height:1.6;letter-spacing:.3em;position:absolute;top:0;left:0;width:200%;transform:rotate(-15deg) translate(-20%,5%);}

/* AURORA (optional) */
.aurora{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.ab{position:absolute;border-radius:50%;filter:blur(100px);mix-blend-mode:screen;}
@keyframes au0{0%{transform:translate(0,0)}100%{transform:translate(60px,40px)}}
@keyframes au1{0%{transform:translate(0,0)}100%{transform:translate(-40px,55px)}}
@keyframes au2{0%{transform:translate(0,0)}100%{transform:translate(30px,-45px)}}

/* HERO */
.hero{padding:28px 32px 18px;position:relative;z-index:2;flex-shrink:0;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.hero-counter{font-family:var(--fm);font-size:10px;color:var(--tm);letter-spacing:.08em;}
.hero-section{font-size:8px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--ts);}
.hero-title{font-size:clamp(44px,5.5vw,88px);font-weight:700;line-height:.95;letter-spacing:-.01em;background:linear-gradient(95deg,var(--tp) 0%,var(--id) 40%,#d4890a 65%,var(--tp) 100%);background-size:250% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:foil 6s linear infinite;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:14px;}
@keyframes foil{0%{background-position:0% 50%}100%{background-position:250% 50%}}
.hero-meta{display:flex;align-items:center;gap:20px;}
.hero-artist{font-family:var(--fb);font-size:14px;font-weight:400;color:var(--ts);letter-spacing:.01em;}
.hero-pill{font-family:var(--fm);font-size:9px;color:var(--ts);background:var(--s1);border:1px solid var(--b2);padding:2px 7px;}
.hero-dur{font-family:var(--fm);font-size:11px;color:var(--id);margin-left:auto;}

/* WAVEFORM */
.wf-zone{position:relative;z-index:2;flex-shrink:0;}
.wf-canvas{width:100%;height:72px;display:block;cursor:crosshair;}
.wf-stamps{display:flex;justify-content:space-between;padding:4px 32px 10px;}
.wf-t{font-family:var(--fm);font-size:8px;color:var(--tm);}

/* L meta panel (no waveform) */
.meta-panel{padding:0 32px 16px;position:relative;z-index:2;flex-shrink:0;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b1);border:1px solid var(--b1);}
.mcell{background:#000;padding:10px 12px;}
.mcell.accent{background:rgba(255,179,71,.04);}
.mc-lbl{font-size:8px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tm);margin-bottom:4px;}
.mc-val{font-family:var(--fm);font-size:20px;font-weight:700;color:var(--ts);line-height:1;}
.mcell.accent .mc-val{font-size:24px;color:var(--id);}

/* TRACKLIST */
.tl{flex:1;overflow-y:auto;position:relative;z-index:2;}
.tl-head{display:grid;grid-template-columns:28px 1fr 80px 40px 44px;gap:0;padding:0 32px;height:28px;align-items:center;border-bottom:1px solid var(--b1);position:sticky;top:0;background:rgba(0,0,0,.95);backdrop-filter:blur(8px);}
.tl-head span{font-size:8px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);}
.tl-row{display:grid;grid-template-columns:28px 1fr 80px 40px 44px;gap:0;padding:0 32px;height:40px;align-items:center;cursor:none;transition:background 80ms;border-bottom:1px solid transparent;}
.tl-row:hover{background:rgba(255,255,255,.02);}
.tl-row.on{background:var(--id-dim);}
.tl-n{font-family:var(--fm);font-size:9px;color:var(--tm);}
.tl-row.on .tl-n{color:var(--id);}
.tl-tit{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:12px;}
.tl-row.on .tl-tit{color:var(--id);}
.tl-art{font-family:var(--fb);font-size:11px;font-weight:400;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-bpm{font-family:var(--fm);font-size:10px;color:var(--ts);text-align:right;}
.tl-dur{font-family:var(--fm);font-size:10px;color:var(--tm);text-align:right;}

/* ─── CHAIN ───────────────────────────────────── */
.chain{width:196px;min-width:196px;background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;}
.cb{border-bottom:1px solid var(--b1);padding:12px 14px;flex-shrink:0;}
.cb.grow{flex:1;overflow-y:auto;}
.cbl{font-size:8px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--tm);margin-bottom:10px;}

/* BIG BPM readout */
.bpm-hero{text-align:center;padding:4px 0 8px;}
.bpm-val{font-family:var(--fm);font-size:52px;font-weight:700;color:var(--id);line-height:1;letter-spacing:-.02em;}
.bpm-lbl{font-size:8px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--ts);margin-top:2px;}
.key-val{font-family:var(--fd);font-size:18px;font-weight:600;color:var(--ts);margin-top:6px;}

/* readout pair */
.rdpair{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);border:1px solid var(--b1);margin-bottom:10px;}
.rdcell{background:var(--void);padding:7px 8px;}
.rd-l{font-size:7px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--tm);margin-bottom:3px;}
.rd-v{font-family:var(--fm);font-size:14px;font-weight:700;color:var(--ts);line-height:1;}

/* pads */
.padgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);border:1px solid var(--b1);}
.pad{aspect-ratio:1;background:var(--void);display:flex;align-items:flex-end;padding:6px;font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);cursor:none;transition:all 60ms;position:relative;overflow:hidden;}
.pad:hover{color:var(--ts);}
.pad.on{color:var(--id);}
.pad-line{position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--id);transform:scaleX(0);transform-origin:left;transition:transform 60ms;}
.pad.on .pad-line{transform:scaleX(1);}

/* toggles */
.trow2{display:flex;align-items:center;justify-content:space-between;padding:5px 0;cursor:none;}
.trow2-lbl{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ts);}
.pill{width:28px;height:14px;background:var(--b1);border:1px solid var(--b2);border-radius:9999px !important;position:relative;cursor:none;transition:all 180ms;flex-shrink:0;}
.pill.on{background:var(--id);border-color:var(--id);}
.pill-knob{position:absolute;width:10px;height:10px;background:#fff;top:1px;left:1px;border-radius:50% !important;transition:transform 180ms;}
.pill.on .pill-knob{transform:translateX(14px);}

/* m3 */
.m3g{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);border:1px solid var(--b1);}
.m3c{background:var(--void);padding:7px 8px;font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);cursor:none;transition:color 100ms;}
.m3c:hover{color:var(--ts);}
.m3c.on{color:var(--id);}

/* L edit fields */
.ef-lbl{font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--tm);margin-bottom:3px;margin-top:8px;}
.ef-lbl:first-child{margin-top:0;}
.ef{background:var(--void);border:1px solid var(--b2);border-bottom:1px solid var(--b1);padding:6px 8px;font-family:var(--fd);font-size:11px;color:var(--tp);width:100%;outline:none;transition:border-color 100ms;}
.ef:focus{border-color:var(--id);}
.ef::placeholder{color:var(--tm);}
.ebtns{display:flex;gap:1px;margin-top:8px;background:var(--b1);}
.ebtn{flex:1;background:var(--void);border:none;padding:7px 0;font-family:var(--fd);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ts);cursor:none;transition:color 100ms;}
.ebtn:hover{color:var(--tp);}
.ebtn.primary{color:var(--id);}

/* telemetry */
.tele-row{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-family:var(--fm);font-size:8px;color:var(--tm);}
.tele-row .ts{color:var(--b2);flex-shrink:0;}
.tele-row.ok{color:#2a5a3a;}

/* ─── TRANSPORT ───────────────────────────────── */
.tbtn{width:36px;height:36px;border:1px solid var(--b2);background:transparent;color:var(--ts);cursor:none;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all 100ms;font-family:var(--fd);font-weight:500;}
.tbtn:hover{border-color:var(--ts);color:var(--tp);}
.tbtn.play{width:44px;height:44px;font-size:16px;border-color:var(--id);color:var(--id);}
.tbtn.play.on{background:var(--id-dim);}
.tbtn.active{border-color:var(--id);color:var(--id);background:var(--id-dim);}
.tbtn.sm{width:auto;padding:0 10px;font-size:9px;letter-spacing:.16em;}

.prog{flex:1;height:1px;background:var(--b2);position:relative;cursor:crosshair;margin:0 8px;}
.prog-fill{position:absolute;left:0;top:0;height:100%;background:var(--id);transition:width 250ms linear;}
.prog-head{position:absolute;top:50%;width:6px;height:6px;background:var(--id);transform:translate(-50%,-50%);pointer-events:none;}
.t-time{font-family:var(--fm);font-size:12px;color:var(--id);letter-spacing:.06em;flex-shrink:0;}
.t-tot{font-family:var(--fm);font-size:10px;color:var(--ts);flex-shrink:0;}
.gain-block{display:flex;flex-direction:column;align-items:center;gap:2px;margin-left:8px;}
.gain-lbl{font-size:7px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);}
input[type=range].gain-sl{-webkit-appearance:none;width:68px;height:1px;background:var(--b2);outline:none;cursor:none;}
input[type=range].gain-sl::-webkit-slider-thumb{-webkit-appearance:none;width:6px;height:10px;background:var(--id);cursor:none;}

/* ─── VOICE ───────────────────────────────────── */
.vtranscript{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.97);border:1px solid var(--id);padding:8px 20px;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--id);z-index:200;pointer-events:none;}

/* ─── CURSOR ──────────────────────────────────── */
.cur-ball{position:fixed;pointer-events:none;z-index:9999;width:10px;height:10px;border-radius:50% !important;background:var(--id);transform:translate(-50%,-50%);transition:width 60ms,height 60ms;}
.cur-ball.click{width:6px;height:6px;}
.cur-spot{position:fixed;pointer-events:none;z-index:1;width:480px;height:480px;border-radius:50% !important;transform:translate(-50%,-50%);background:radial-gradient(circle,var(--id-dim) 0%,transparent 70%);}
</style>
</head>

<div id="root"></div>

const THEMES={

/* ── UTILS ──────────────────────────────────── */
const ds=d=>{const[m,s]=d.split(":").map(Number);return m*60+s;};
const sd=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
const sr=n=>{let s=n;return()=>{s=(s*1664525+1013904223)&0xffffffff;return Math.abs(s)/2147483648;};};

/* ── CURSOR ─────────────────────────────────── */
function Cursor({id}){
  const b=useRef(),sp=useRef();
  const[click,setClick]=useState(false);
  useEffect(()=>{
    const mv=e=>{if(b.current){b.current.style.left=e.clientX+"px";b.current.style.top=e.clientY+"px";}if(sp.current){sp.current.style.left=e.clientX+"px";sp.current.style.top=e.clientY+"px";}};
    const dn=()=>setClick(true),up=()=>setClick(false);
    window.addEventListener("mousemove",mv);window.addEventListener("mousedown",dn);window.addEventListener("mouseup",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mousedown",dn);window.removeEventListener("mouseup",up);};
  },[]);
  return<>{/*spot*/}<div ref={sp} className="cur-spot" style={{background:`radial-gradient(circle,${id.replace("rgb","rgba").replace(")",",0.07)")} 0%,transparent 70%)`}}/><div ref={b} className={`cur-ball${click?" click":""}`} style={{background:id,boxShadow:`0 0 10px ${id},0 0 22px ${id}`}}/></>;
}

/* ── WAVEFORM ───────────────────────────────── */
function Waveform({track,progress,theme,onSeek}){
  const cv=useRef();
  const bars=useMemo(()=>{const r=sr(track.id*7331);return Array.from({length:240},()=>0.1+r()*.9);},[track.id]);
  useEffect(()=>{
    const c=cv.current;if(!c)return;
    const ctx=c.getContext("2d"),W=c.width,H=c.height,bw=W/bars.length,px=W*progress;
    ctx.clearRect(0,0,W,H);
    bars.forEach((h,i)=>{
      const x=i*bw,bh=h*H*.9,y=(H-bh)/2;
      if(x<px){const t=i/bars.length;ctx.fillStyle=`rgba(${Math.round(theme.idR*(.65+t*.35))},${Math.round(theme.idG*(.2+t*.6))},${theme.idB},.88)`;}
      else ctx.fillStyle="rgba(255,255,255,.045)";
      ctx.fillRect(x+.5,y,bw-.8,bh);
    });
    ctx.fillStyle=theme.id;ctx.shadowColor=theme.id;ctx.shadowBlur=12;ctx.fillRect(px-1,0,2,H);ctx.shadowBlur=0;
    for(let y=0;y<H;y+=2){ctx.fillStyle="rgba(0,0,0,.22)";ctx.fillRect(0,y,W,1);}
  },[bars,progress,theme]);
  return<canvas ref={cv} width={1000} height={72} className="wf-canvas" onClick={e=>{const r=e.currentTarget.getBoundingClientRect();onSeek((e.clientX-r.left)/r.width);}}/>;
}

/* ── VOICE ───────────────────────────────────── */
function useVoice(theme,onCmd){
  const[listening,setListening]=useState(false);
  const[transcript,setTranscript]=useState("");
  const sy=useRef(window.speechSynthesis);
  const speak=useCallback(text=>{
    if(!sy.current)return;sy.current.cancel();
    const u=new SpeechSynthesisUtterance(text);u.pitch=theme.voicePitch;u.rate=theme.voiceRate;u.volume=.9;sy.current.speak(u);
  },[theme]);
  const listen=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){speak("Speech recognition not available.");return;}
    const rec=new SR();rec.lang="en-US";rec.interimResults=false;
    rec.onstart=()=>setListening(true);
    rec.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase().trim();setTranscript(t);onCmd(t,speak);setTimeout(()=>setTranscript(""),3000);};
    rec.onerror=rec.onend=()=>setListening(false);
    rec.start();
  },[onCmd,speak]);
  return{listening,transcript,speak,listen};
}

/* ── APP ─────────────────────────────────────── */
const _initVault = urlVault && THEMES[urlVault] ? urlVault : (urlOwner||'d');
const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{
  "console": "l",
  "aurora": false,
  "cursor": true
}/*EDITMODE-END*/;

function App(){
  const[tweaks,setTweak]=useTweaks({...TWEAK_DEFAULTS, console: _initVault});
  const owner=tweaks.console;
  const theme=THEMES[owner];

  const[track,setTrack]=useState(TRACKS[0]);
  const[playing,setPlaying]=useState(false);
  const[progress,setProgress]=useState(0);
  const[sessec,setSessec]=useState(0);
  const[activeVault,setActiveVault]=useState("d8p");

  useEffect(()=>{
    const r=document.documentElement.style;
    r.setProperty("--id",theme.id);r.setProperty("--id-dim",theme.idDim);r.setProperty("--id-glow",theme.idGlow);
  },[theme]);

  useEffect(()=>{
    if(!playing)return;
    const tot=ds(track.dur);
    const t=setInterval(()=>setProgress(p=>{if(p>=1){setPlaying(false);return 0;}return p+1/tot;}),1000);
    return()=>clearInterval(t);
  },[playing,track]);

  useEffect(()=>{const t=setInterval(()=>setSessec(s=>s+1),1000);return()=>clearInterval(t);},[]);

  const handleCmd=useCallback((text,speak)=>{
    if(text.includes("play")){setPlaying(true);speak(`Playing ${track.title}.`);}
    else if(text.includes("pause")||text.includes("stop")){setPlaying(false);speak("Paused.");}
    else if(text.includes("next")){const i=TRACKS.findIndex(t=>t.id===track.id);const n=TRACKS[(i+1)%TRACKS.length];setTrack(n);setProgress(0);speak(`Loading ${n.title}. ${n.bpm} BPM.`);}
    else if(text.includes("previous")||text.includes("back")){const i=TRACKS.findIndex(t=>t.id===track.id);const n=TRACKS[(i-1+TRACKS.length)%TRACKS.length];setTrack(n);setProgress(0);speak(`Loading ${n.title}.`);}
    else if(text.includes("what")&&text.includes("playing")){speak(`Now playing ${track.title} by ${track.artist}. ${track.bpm} beats per minute.`);}
    else{const m=TRACKS.find(t=>text.includes(t.title.toLowerCase().split(" ")[0]));if(m){setTrack(m);setProgress(0);speak(`Loading ${m.title}. ${m.bpm} BPM.`);}else speak("Command not recognized.");}
  },[track]);

  const{listening,transcript,speak,listen}=useVoice(theme,handleCmd);

  const load=useCallback(t=>{setTrack(t);setProgress(0);speak(`Loading ${t.title}. ${t.bpm} BPM.`);},[speak]);
  const sessTime=`${String(Math.floor(sessec/3600)).padStart(2,"0")}:${String(Math.floor((sessec%3600)/60)).padStart(2,"0")}:${String(sessec%60).padStart(2,"0")}`;

  useEffect(()=>{
    const h=e=>{if(e.target.tagName==="INPUT")return;if(e.code==="Space"){e.preventDefault();setPlaying(p=>!p);}if(e.code==="KeyV")listen();};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  });

  return(
    <div className="console">
      {tweaks.cursor&&<Cursor id={theme.id}/>}
      <Rail theme={theme} owner={owner} track={track} sess={sessTime} listening={listening} onVoice={listen}/>
      <div className="main">
        <Bins owner={owner} theme={theme} activeId={track.id} onSelect={load} activeVault={activeVault} onVault={setActiveVault}/>
        <Monitor owner={owner} track={track} progress={progress} theme={theme} onSeek={p=>setProgress(p)} aurora={tweaks.aurora}/>
        <Chain owner={owner} theme={theme} track={track}/>
      </div>
      <Transport theme={theme} track={track} playing={playing}
        onPlay={()=>setPlaying(p=>{if(!p)speak(`Playing ${track.title}`);return!p;})}
        progress={progress} onSeek={p=>setProgress(p)}
        onPrev={()=>{const i=TRACKS.findIndex(t=>t.id===track.id);load(TRACKS[(i-1+TRACKS.length)%TRACKS.length]);}}
        onNext={()=>{const i=TRACKS.findIndex(t=>t.id===track.id);load(TRACKS[(i+1)%TRACKS.length]);}}/>
      {transcript&&<div className="vtranscript" style={{borderColor:theme.id,color:theme.id}}>◎ {transcript}</div>}
      <TweaksPanel>
        <TweakSection label="CONSOLE"/>
        <TweakRadio label="Artist" value={tweaks.console} options={["d","l"]} onChange={v=>setTweak("console",v)}/>
        <TweakSection label="DISPLAY"/>
        <TweakToggle label="Aurora" value={tweaks.aurora} onChange={v=>setTweak("aurora",v)}/>
        <TweakToggle label="Cursor" value={tweaks.cursor} onChange={v=>setTweak("cursor",v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
