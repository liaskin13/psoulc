<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC // D — VARIANT A: SERATO SOVEREIGN</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#000;--s1:#060606;--s2:#0a0a0a;--b1:#111;--b2:#1a1a1a;--b3:#222;
  --tp:#e8e4de;--ts:#484848;--tm:#252525;
  --id:#ffb347;--id2:#d4890a;--id-dim:rgba(255,179,71,.07);--id-glow:0 0 24px rgba(255,179,71,.16);
  --red:#cc2200;--font:'Chakra Petch',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--void);color:var(--tp);font-family:var(--font);}
body{cursor:none;}
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:var(--b2);}
.console{display:grid;grid-template-rows:36px 1fr 60px;width:100vw;height:100vh;}
.main{display:flex;min-height:0;overflow:hidden;}

/* RAIL */
.rail{display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--void);border-bottom:1px solid var(--b1);z-index:20;}
.rail-mark{font-family:'Comfortaa',sans-serif;font-size:13px;font-weight:700;color:var(--id);letter-spacing:-.01em;}
.r-sep{width:1px;height:14px;background:var(--b1);flex-shrink:0;}
.r-lbl{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--ts);}
.r-lbl.id{color:var(--id);opacity:.8;}
.r-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.r-bpm{font-family:var(--font);font-size:13px;font-weight:700;color:var(--id);letter-spacing:.04em;}
.r-clock{font-family:var(--font);font-size:9px;color:var(--ts);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:rp 1.6s ease-in-out infinite;flex-shrink:0;}
@keyframes rp{0%,100%{opacity:.2}50%{opacity:1}}
.signal-btn{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--ts);color:var(--ts);background:transparent;cursor:none;transition:all 120ms;}
.signal-btn.live{border-color:#ff3030;color:#ff3030;background:rgba(255,48,48,.08);animation:rp .8s ease-in-out infinite;}
.r-icon{width:22px;height:22px;border:1px solid var(--b2);background:transparent;color:var(--ts);cursor:none;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all 100ms;}
.r-icon:hover{border-color:var(--id);color:var(--id);}

/* BINS */
.bins{width:200px;min-width:200px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.bins-accent{position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--id);opacity:.35;}
.bins-hd{padding:12px 14px 10px 16px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--b1);flex-shrink:0;}
.bins-lbl{font-size:8px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--id);opacity:.6;}
.bins-cnt{font-family:var(--font);font-size:8px;color:var(--tm);}
.vrow{display:flex;align-items:center;gap:8px;padding:8px 13px 8px 16px;border-bottom:1px solid var(--b1);cursor:none;transition:background 80ms;flex-shrink:0;}
.vrow:hover{background:rgba(255,255,255,.015);}
.vrow.on{background:rgba(255,255,255,.022);}
.vdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.vname{font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;line-height:1.3;}
.vcnt{font-family:var(--font);font-size:7px;color:var(--tm);margin-left:auto;flex-shrink:0;}
.bins-tracks{flex:1;overflow-y:auto;}
.trow{display:flex;align-items:center;padding:0 12px 0 16px;height:40px;cursor:none;position:relative;transition:background 80ms;border-bottom:1px solid rgba(255,255,255,.018);}
.trow:hover{background:rgba(255,255,255,.02);}
.trow.on{background:var(--id-dim);}
.tbar{position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--id);}
.tr-n{font-family:var(--font);font-size:7px;color:var(--tm);width:16px;flex-shrink:0;}
.tr-info{flex:1;min-width:0;}
.tr-title{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-sub{font-size:7px;color:var(--ts);margin-top:1px;}
.tr-bpm{font-family:var(--font);font-size:7px;color:var(--tm);flex-shrink:0;margin-left:6px;}
.tier-badge{width:13px;height:13px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;flex-shrink:0;margin-left:4px;}
.bins-wm{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:'Comfortaa',sans-serif;font-size:54px;font-weight:700;color:var(--tp);opacity:.016;pointer-events:none;user-select:none;}

/* MONITOR */
.monitor{flex:1;background:#000;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.dp-tex{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.dp-tex::before{content:'dp dp dp dp dp\A dp dp dp dp dp\A dp dp dp dp dp\A dp dp dp dp dp\A dp dp dp dp dp';font-family:'Comfortaa',sans-serif;font-size:46px;font-weight:700;white-space:pre;color:var(--tp);opacity:.013;line-height:1.7;letter-spacing:.32em;position:absolute;top:0;left:0;width:200%;transform:rotate(-15deg) translate(-20%,5%);}
.aurora{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.ab{position:absolute;border-radius:50%;filter:blur(90px);mix-blend-mode:screen;}
@keyframes au0{0%{transform:translate(0,0)}100%{transform:translate(55px,38px)}}
@keyframes au1{0%{transform:translate(0,0)}100%{transform:translate(-38px,52px)}}
@keyframes au2{0%{transform:translate(0,0)}100%{transform:translate(28px,-42px)}}
.hero{padding:22px 28px 12px;position:relative;z-index:2;flex-shrink:0;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hero-sect{font-size:7px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:var(--ts);}
.hero-idx{font-family:var(--font);font-size:9px;color:var(--tm);}
.hero-title{font-size:clamp(40px,5vw,80px);font-weight:700;line-height:1.05;letter-spacing:-.01em;padding-bottom:.12em;background:linear-gradient(95deg,var(--tp) 0%,var(--id) 38%,var(--id2) 62%,var(--tp) 100%);background-size:250% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:foil 6s linear infinite;white-space:nowrap;text-overflow:ellipsis;overflow:visible;margin-bottom:10px;}
@keyframes foil{0%{background-position:0% 50%}100%{background-position:250% 50%}}
.hero-meta{display:flex;align-items:center;gap:14px;}
.hero-artist{font-size:12px;font-weight:400;color:var(--ts);}
.hero-key{font-family:var(--font);font-size:8px;color:var(--ts);background:var(--s1);border:1px solid var(--b2);padding:2px 6px;}
.hero-dur{font-family:var(--font);font-size:10px;color:var(--id);margin-left:auto;}

/* WAVEFORM */
.wf-zone{position:relative;z-index:2;flex-shrink:0;}
.wf-canvas{width:100%;height:120px;display:block;cursor:crosshair;}
.wf-armed{position:absolute;top:6px;left:16px;font-size:7px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:2px 8px;border:1px solid;animation:rp .5s ease-in-out infinite;pointer-events:none;z-index:3;}
.wf-stamps{display:flex;justify-content:space-between;padding:3px 28px 8px;}
.wf-t{font-family:var(--font);font-size:7px;color:var(--tm);}

/* TRACKLIST */
.tl{flex:1;overflow-y:auto;position:relative;z-index:2;}
.tl-hd{display:grid;grid-template-columns:22px 1fr 68px 34px 40px 20px;padding:0 28px;height:26px;align-items:center;border-bottom:1px solid var(--b1);position:sticky;top:0;background:rgba(0,0,0,.96);backdrop-filter:blur(8px);}
.tl-hd span{font-size:7px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);}
.tl-row{display:grid;grid-template-columns:22px 1fr 68px 34px 40px 20px;padding:0 28px;height:38px;align-items:center;cursor:none;transition:background 80ms;border-bottom:1px solid rgba(255,255,255,.02);}
.tl-row:hover{background:rgba(255,255,255,.02);}
.tl-row.on{background:var(--id-dim);}
.tl-n{font-family:var(--font);font-size:8px;color:var(--tm);}
.tl-row.on .tl-n{color:var(--id);}
.tl-tit{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px;}
.tl-row.on .tl-tit{color:var(--id);}
.tl-art{font-size:10px;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-bpm,.tl-dur{font-family:var(--font);font-size:9px;color:var(--ts);text-align:right;}
.tl-dur{color:var(--tm);}
.tl-tier{display:flex;justify-content:center;align-items:center;}

/* CHAIN */
.chain{width:220px;min-width:220px;background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;}
.cb{border-bottom:1px solid var(--b1);padding:10px 12px;flex-shrink:0;}
.cb.grow{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.cb-lbl{font-size:7px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:var(--tm);margin-bottom:8px;}
.bpm-hero{text-align:center;padding:2px 0 4px;}
.bpm-val{font-family:var(--font);font-size:52px;font-weight:700;color:var(--id);line-height:1;letter-spacing:-.02em;}
.bpm-lbl{font-size:7px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--ts);margin-top:1px;}
.key-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:5px;}
.key-val{font-family:var(--font);font-size:15px;font-weight:600;color:rgba(255,179,71,.55);}
.key-lbl{font-size:7px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--tm);}
.rdpair{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);border:1px solid var(--b1);margin-top:8px;}
.rdcell{background:var(--void);padding:5px 7px;}
.rd-l{font-size:6px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--tm);margin-bottom:2px;}
.rd-v{font-family:var(--font);font-size:12px;font-weight:700;color:var(--ts);}
.padgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b1);border:1px solid var(--b1);}
.pad{aspect-ratio:1.1;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:4px 2px;cursor:none;transition:all 60ms;position:relative;overflow:hidden;}
.pad-num{font-size:6px;font-weight:700;letter-spacing:.06em;color:var(--tm);}
.pad-st{font-size:5px;letter-spacing:.05em;color:var(--tm);margin-top:1px;}
.pad.has{background:rgba(255,255,255,.02);}
.pad.armed{animation:rp .45s ease-in-out infinite;}
.pad-dot{position:absolute;top:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;}
.cycle-tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0;}
.ctab{flex:1;font-size:6px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:5px 0;text-align:center;color:var(--tm);cursor:none;border-right:1px solid var(--b1);transition:color 80ms;}
.ctab:last-child{border-right:none;}
.ctab.on{color:var(--id);}
.cycle-body{flex:1;overflow-y:auto;padding:10px 12px;}
.c-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.c-lbl{font-size:7px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--tm);}
.c-val{font-family:var(--font);font-size:9px;color:var(--ts);}
.c-val.hi{color:var(--id);}
.c-val.live{color:#ff3030;}
.broadcast-btn{width:100%;padding:9px 0;font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--ts);color:var(--ts);background:transparent;cursor:none;transition:all 120ms;margin-bottom:10px;font-family:var(--font);}
.broadcast-btn.live{border-color:#ff3030;color:#ff3030;background:rgba(255,48,48,.07);}
.msg-btn{width:100%;padding:7px 0;font-size:7px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;border:none;border-bottom:1px solid rgba(255,255,255,.04);color:var(--ts);background:transparent;cursor:none;text-align:left;display:flex;align-items:center;gap:8px;transition:color 80ms;font-family:var(--font);}
.msg-btn:hover{color:var(--tp);}
.msg-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.pill{width:26px;height:12px;background:var(--b1);border:1px solid var(--b2);border-radius:9999px;position:relative;cursor:none;transition:all 180ms;}
.pill.on{background:var(--id);border-color:var(--id);}
.pill-k{position:absolute;width:8px;height:8px;background:#fff;top:1px;left:1px;border-radius:50%;transition:transform 180ms;}
.pill.on .pill-k{transform:translateX(14px);}
.sys-action{padding:2px 8px;border:1px solid var(--b2);color:var(--ts);font-size:7px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:transparent;cursor:none;transition:all 80ms;font-family:var(--font);}
.sys-action:hover{border-color:var(--ts);color:var(--tp);}
.m3g{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);border:1px solid var(--b1);margin-top:6px;}
.m3c{background:var(--void);padding:6px 8px;}
.m3n{font-family:var(--font);font-size:14px;font-weight:700;color:var(--ts);display:block;line-height:1;margin-bottom:2px;}
.m3lbl{font-size:6px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);}

/* TRANSPORT */
.transport{display:flex;align-items:center;gap:8px;padding:0 16px;background:var(--void);border-top:1px solid var(--b1);z-index:20;}
.tbtn{width:34px;height:34px;border:1px solid var(--b2);background:transparent;color:var(--ts);cursor:none;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 100ms;font-family:var(--font);}
.tbtn:hover{border-color:var(--ts);color:var(--tp);}
.tbtn.play{width:42px;height:42px;font-size:15px;border-color:var(--id);color:var(--id);}
.tbtn.on{border-color:var(--id);color:var(--id);background:var(--id-dim);}
.tbtn.active{border-color:var(--id);color:var(--id);background:var(--id-dim);}
.tbtn.sm{width:auto;padding:0 10px;font-size:7px;letter-spacing:.14em;text-transform:uppercase;}
.t-time{font-family:var(--font);font-size:11px;color:var(--id);letter-spacing:.04em;flex-shrink:0;}
.t-tot{font-family:var(--font);font-size:9px;color:var(--ts);flex-shrink:0;}
.prog{flex:1;height:1px;background:var(--b2);position:relative;cursor:crosshair;margin:0 6px;}
.prog-fill{position:absolute;left:0;top:0;height:100%;background:var(--id);}
.prog-head{position:absolute;top:50%;width:5px;height:5px;background:var(--id);transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 6px var(--id);}
.gain-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;margin-left:6px;}
.gain-lbl{font-size:6px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);}
input[type=range].gain-sl{-webkit-appearance:none;width:58px;height:1px;background:var(--b2);outline:none;cursor:none;}
input[type=range].gain-sl::-webkit-slider-thumb{-webkit-appearance:none;width:5px;height:9px;background:var(--id);cursor:none;}

/* CURSOR */
.cur-ball{position:fixed;pointer-events:none;z-index:9999;width:10px;height:10px;border-radius:50%;background:var(--id);transform:translate(-50%,-50%);transition:width 60ms,height 60ms;box-shadow:0 0 10px var(--id),0 0 20px rgba(255,179,71,.3);}
.cur-ball.click{width:6px;height:6px;}
.cur-spot{position:fixed;pointer-events:none;z-index:1;width:480px;height:480px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,179,71,.065) 0%,transparent 70%);}
</style>
</head>
<body>

<div id="cur-spot" class="cur-spot"></div>
<div id="cur-ball" class="cur-ball"></div>

<div class="console">
  <!-- RAIL -->
  <div class="rail">
    <span class="rail-mark">dp</span>
    <div class="r-sep"></div>
    <span class="r-lbl id">D8P CONSOLE</span>
    <div class="r-sep"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="live-dot"></div>
      <span class="r-lbl">LIVE</span>
    </div>
    <div class="r-sep"></div>
    <span id="r-sess" class="r-lbl">SESSION 00:00:00</span>
    <div class="r-right">
      <span id="r-bpm" class="r-bpm">80 BPM</span>
      <div class="r-sep"></div>
      <button id="signal-btn" class="signal-btn">&#9678; THE SIGNAL</button>
      <div class="r-sep"></div>
      <span id="r-clock" class="r-clock">00:00:00</span>
      <div class="r-sep"></div>
      <button class="r-icon" title="Profile">&#8857;</button>
      <button class="r-icon" title="Logout">&#8618;</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- BINS -->
    <div class="bins">
      <div class="bins-accent"></div>
      <div class="bins-hd">
        <span class="bins-lbl">VAULT</span>
        <span id="bins-total" class="bins-cnt">9</span>
      </div>
      <div id="vault-list"></div>
      <div id="bins-tracks" class="bins-tracks"></div>
      <div class="bins-wm">dp</div>
    </div>

    <!-- MONITOR -->
    <div class="monitor">
      <div class="dp-tex"></div>
      <div id="aurora" class="aurora"></div>
      <div class="hero">
        <div class="hero-top">
          <span id="hero-sect" class="hero-sect">ORIG</span>
          <span id="hero-idx" class="hero-idx">01 / 09</span>
        </div>
        <div id="hero-title" class="hero-title">eightysixty</div>
        <div class="hero-meta">
          <span id="hero-artist" class="hero-artist">Soul Pleasant</span>
          <span id="hero-key" class="hero-key">F min</span>
          <span id="hero-dur" class="hero-dur">0:00 / 4:22</span>
        </div>
      </div>
      <div class="wf-zone">
        <div id="wf-armed-ind" class="wf-armed" style="display:none"></div>
        <canvas id="wf-canvas" class="wf-canvas" width="1200" height="120"></canvas>
        <div class="wf-stamps">
          <span class="wf-t">00:00</span>
          <span id="wf-cur" class="wf-t" style="color:rgba(255,179,71,.45)">0:00</span>
          <span id="wf-dur" class="wf-t">4:22</span>
        </div>
      </div>
      <div class="tl">
        <div class="tl-hd">
          <span></span><span>TITLE</span><span>ARTIST</span>
          <span style="text-align:right">BPM</span><span style="text-align:right">DUR</span>
          <span style="text-align:center">T</span>
        </div>
        <div id="tl-body"></div>
      </div>
    </div>

    <!-- CHAIN -->
    <div class="chain">
      <div class="cb">
        <div class="cb-lbl">SIGNAL</div>
        <div class="bpm-hero">
          <div id="bpm-val" class="bpm-val">80</div>
          <div class="bpm-lbl">BPM</div>
        </div>
        <div class="key-row">
          <span id="key-val" class="key-val">F min</span>
          <span class="key-lbl">KEY</span>
        </div>
        <div class="rdpair">
          <div class="rdcell"><div class="rd-l">kbps</div><div class="rd-v">320</div></div>
          <div class="rdcell"><div class="rd-l">kHz</div><div class="rd-v">44.1</div></div>
        </div>
      </div>
      <div class="cb">
        <div class="cb-lbl">HOT CUES — arm then click waveform</div>
        <div id="padgrid" class="padgrid"></div>
      </div>
      <div class="cb grow">
        <div class="cycle-tabs" id="cycle-tabs">
          <div class="ctab on" data-tab="signal">SIGNAL</div>
          <div class="ctab" data-tab="analytics">ANLYT</div>
          <div class="ctab" data-tab="msgs">MSGS</div>
          <div class="ctab" data-tab="system">SYSTEM</div>
        </div>
        <div id="cycle-body" class="cycle-body"></div>
      </div>
    </div>
  </div>

  <!-- TRANSPORT -->
  <div class="transport">
    <button id="prev-btn" class="tbtn">&#9198;</button>
    <button id="play-btn" class="tbtn play">&#9654;</button>
    <button id="next-btn" class="tbtn">&#9197;</button>
    <button id="cue-btn" class="tbtn sm">CUE</button>
    <button id="loop-btn" class="tbtn sm">&#10227; LOOP</button>
    <span id="t-time" class="t-time" style="margin-left:6px">0:00</span>
    <div id="prog-bar" class="prog">
      <div id="prog-fill" class="prog-fill" style="width:0%"></div>
      <div id="prog-head" class="prog-head" style="left:0%"></div>
    </div>
    <span id="t-tot" class="t-tot">4:22</span>
    <div class="gain-wrap">
      <span class="gain-lbl">GAIN</span>
      <input type="range" id="gain-sl" class="gain-sl" min="0" max="100" value="80">
    </div>
  </div>
</div>

<script>
const TRACKS = [
  {id:1,title:"eightysixty",artist:"Soul Pleasant",bpm:80,key:"F min",dur:"4:22",tier:"M",vault:"orig"},
  {id:2,title:"fucked dis house 124",artist:"Soul Pleasant",bpm:124,key:"A min",dur:"5:44",tier:"M",vault:"orig"},
  {id:3,title:"That's What U R",artist:"Amerie",bpm:96,key:"D min",dur:"3:58",tier:"B",vault:"arch"},
  {id:4,title:"96tagetemvvv",artist:"Soul Pleasant",bpm:96,key:"G min",dur:"6:12",tier:"M",vault:"orig"},
  {id:5,title:"120'em Pt.2",artist:"Soul Pleasant",bpm:120,key:"C min",dur:"7:03",tier:"U",vault:"mixes"},
  {id:6,title:"onetwentyfaackin3mmmm",artist:"Soul Pleasant",bpm:120,key:"F min",dur:"5:31",tier:"A",vault:"mixes"},
  {id:7,title:"91enounting",artist:"Soul Pleasant",bpm:91,key:"Bb",dur:"4:47",tier:"M",vault:"orig"},
  {id:8,title:"93'was infinity",artist:"Soul Pleasant",bpm:93,key:"E min",dur:"8:15",tier:"M",vault:"orig"},
  {id:9,title:"sumtimg wright rongbbb",artist:"Soul Pleasant",bpm:88,key:"D min",dur:"5:22",tier:"U",vault:"mixes"},
];
const VAULTS = [
  {id:"orig",name:"ORIGINAL MUSIC",color:"#ffb347",count:9},
  {id:"mixes",name:"MIXES",color:"#4488ff",count:14},
  {id:"live",name:"LIVE SETS",color:"#ff4488",count:6},
  {id:"arch",name:"SONIC ARCH",color:"#44ffaa",count:22},
];
const TIER = {M:{c:"#ffb347"},B:{c:"#555"},U:{c:"#cc44aa"},A:{c:"#777"}};
const PAD_COLORS = ["#ff4444","#44aaff","#44ff88","#ffaa00","#ff44cc","#44ffff","#ff8800","#aa44ff"];
const AURORA_CFG = [
  {w:500,h:360,c:"rgba(230,100,10,0.09)",t:"-10%",l:"-5%",d:20},
  {w:360,h:440,c:"rgba(160,70,0,0.08)",t:"25%",l:"35%",d:26},
  {w:300,h:300,c:"rgba(190,120,0,0.07)",t:"58%",l:"65%",d:18}
];

const S = {
  tidx:0, playing:false, progress:0,
  vault:"orig", cues:{}, armed:null,
  broadcasting:false, btime:0,
  tab:"signal", sys:{EQ:true,EFX:false,VOICE:false,AURORA:true},
  sessec:0, gain:80, loop:false
};

const $ = id => document.getElementById(id);
const track = () => TRACKS[S.tidx];

function ds(d){const [m,s]=d.split(':').map(Number);return m*60+s;}
function ft(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function fl(s){return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

let bars=[];
function computeBars(t){
  let seed=t.id*7331;
  bars=Array.from({length:240},()=>{
    seed=(seed*1664525+1013904223)&0xffffffff;
    return 0.1+Math.abs(seed)/2147483648*0.9;
  });
}

function drawWaveform(){
  const cv=$('wf-canvas');if(!cv)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,bw=W/bars.length,px=W*S.progress;
  ctx.clearRect(0,0,W,H);
  bars.forEach((h,i)=>{
    const x=i*bw,bh=h*H*.88,y=(H-bh)/2,al=x<px?.9:.2;
    let col;
    if(h<.28)col='rgba(32,96,255,'+al+')';
    else if(h<.50)col='rgba(32,188,96,'+al+')';
    else if(h<.72)col='rgba(255,179,71,'+al+')';
    else col='rgba(255,55,25,'+al+')';
    ctx.fillStyle=col;ctx.fillRect(x,y,bw-.5,bh);
  });
  ctx.fillStyle='#ffb347';ctx.shadowColor='#ffb347';ctx.shadowBlur=8;
  ctx.fillRect(px-1,0,2,H);ctx.shadowBlur=0;
  for(let y=0;y<H;y+=2){ctx.fillStyle='rgba(0,0,0,.16)';ctx.fillRect(0,y,W,1);}
  Object.entries(S.cues).forEach(([n,pos])=>{
    const x=pos*W,color=PAD_COLORS[(n-1)%PAD_COLORS.length];
    ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=5;
    ctx.beginPath();ctx.moveTo(x-7,2);ctx.lineTo(x+7,2);ctx.lineTo(x,13);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle=color;ctx.font="bold 8px 'Chakra Petch'";ctx.textAlign='center';
    ctx.fillText(n,x,26);ctx.textAlign='left';
  });
  const el=Math.floor(ds(track().dur)*S.progress);
  $('wf-cur').textContent=ft(el);
}

function updateHero(){
  const t=track();
  $('hero-title').textContent=t.title;
  $('hero-artist').textContent=t.artist;
  $('hero-key').textContent=t.key;
  const el=Math.floor(ds(t.dur)*S.progress);
  $('hero-dur').textContent=ft(el)+' / '+t.dur;
  $('hero-sect').textContent=t.vault.toUpperCase();
  $('hero-idx').textContent=String(S.tidx+1).padStart(2,'0')+' / '+String(TRACKS.length).padStart(2,'0');
  $('bpm-val').textContent=t.bpm;
  $('key-val').textContent=t.key;
  $('r-bpm').textContent=t.bpm+' BPM';
  $('wf-dur').textContent=t.dur;
  $('t-tot').textContent=t.dur;
}

function updateTransport(){
  const el=Math.floor(ds(track().dur)*S.progress);
  $('t-time').textContent=ft(el);
  const pct=S.progress*100;
  $('prog-fill').style.width=pct+'%';
  $('prog-head').style.left=pct+'%';
  const pb=$('play-btn');
  pb.innerHTML=S.playing?'&#9646;&#9646;':'&#9654;';
  pb.className='tbtn play'+(S.playing?' on':'');
  $('loop-btn').className='tbtn sm'+(S.loop?' active':'');
}

function updateArmedInd(){
  const ind=$('wf-armed-ind');if(!ind)return;
  if(S.armed!==null){
    const c=PAD_COLORS[(S.armed-1)%PAD_COLORS.length];
    ind.textContent='CUE '+S.armed+' ARMED — CLICK TO PLACE';
    ind.style.color=c;ind.style.borderColor=c;ind.style.display='block';
  }else{ind.style.display='none';}
}

function updatePads(){
  for(let n=1;n<=8;n++){
    const pad=$('pad-'+n);if(!pad)continue;
    const c=PAD_COLORS[(n-1)%PAD_COLORS.length];
    const has=S.cues[n]!==undefined,arm=S.armed===n;
    pad.className='pad'+(has?' has':'')+(arm?' armed':'');
    if(arm){pad.style.background=c+'16';pad.style.boxShadow='inset 0 0 0 1px '+c+'55';}
    else if(has){pad.style.background='';pad.style.boxShadow='inset 0 0 0 1px '+c+'28';}
    else{pad.style.background='';pad.style.boxShadow='';}
    const dot=pad.querySelector('.pad-dot');
    if(dot)dot.style.display=has?'block':'none';
    const num=pad.querySelector('.pad-num');
    if(num)num.style.color=arm||has?c:'';
    const st=pad.querySelector('.pad-st');
    if(st){st.style.color=arm?c+'aa':has?'rgba(255,255,255,.25)':'';st.textContent=arm?'ARM':has?'SET':'—';}
  }
}

function buildBinsTracks(){
  $('bins-tracks').innerHTML=TRACKS.map((t,i)=>
    '<div class="trow'+(i===S.tidx?' on':'')+'" data-tidx="'+i+'">'+
    '<div class="tbar" style="opacity:'+(i===S.tidx?1:0)+'"></div>'+
    '<span class="tr-n">'+String(i+1).padStart(2,'0')+'</span>'+
    '<div class="tr-info">'+
    '<div class="tr-title"'+(i===S.tidx?' style="color:var(--id)"':'')+'>'+t.title+'</div>'+
    '<div class="tr-sub">'+t.artist+'</div></div>'+
    '<span class="tr-bpm">'+t.bpm+'</span>'+
    '<div class="tier-badge" style="background:'+TIER[t.tier].c+'18;border:1px solid '+TIER[t.tier].c+'40;color:'+TIER[t.tier].c+'">'+t.tier+'</div>'+
    '</div>'
  ).join('');
}

function buildMonitorTracks(){
  $('tl-body').innerHTML=TRACKS.map((t,i)=>
    '<div class="tl-row'+(i===S.tidx?' on':'')+'" data-tidx="'+i+'">'+
    '<span class="tl-n">'+(i===S.tidx?'&#9654;':String(i+1).padStart(2,'0'))+'</span>'+
    '<span class="tl-tit">'+t.title+'</span>'+
    '<span class="tl-art">'+t.artist+'</span>'+
    '<span class="tl-bpm">'+t.bpm+'</span>'+
    '<span class="tl-dur">'+t.dur+'</span>'+
    '<div class="tl-tier"><div style="width:12px;height:12px;background:'+TIER[t.tier].c+'18;border:1px solid '+TIER[t.tier].c+'44;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:'+TIER[t.tier].c+'">'+t.tier+'</div></div>'+
    '</div>'
  ).join('');
}

function buildVaults(){
  $('vault-list').innerHTML=VAULTS.map(v=>
    '<div class="vrow'+(S.vault===v.id?' on':'')+'" data-vid="'+v.id+'">'+
    '<div class="vdot" style="background:'+v.color+';box-shadow:0 0 5px '+v.color+'"></div>'+
    '<span class="vname"'+(S.vault===v.id?' style="color:'+v.color+'"':'')+'>'+v.name+'</span>'+
    '<span class="vcnt">'+v.count+'</span></div>'
  ).join('');
}

function buildPads(){
  $('padgrid').innerHTML=[1,2,3,4,5,6,7,8].map(n=>{
    const c=PAD_COLORS[n-1];
    return '<div id="pad-'+n+'" class="pad">'+
      '<div class="pad-dot" style="background:'+c+';box-shadow:0 0 4px '+c+';display:none"></div>'+
      '<div class="pad-num">C'+n+'</div>'+
      '<div class="pad-st">—</div></div>';
  }).join('');
  for(let n=1;n<=8;n++){(n=>{
    $('pad-'+n).addEventListener('click',()=>handlePad(n));
  })(n);}
}

function buildAurora(){
  $('aurora').innerHTML=AURORA_CFG.map((b,i)=>
    '<div class="ab" style="width:'+b.w+'px;height:'+b.h+'px;background:'+b.c+';top:'+b.t+';left:'+b.l+';animation:au'+i+' '+b.d+'s ease-in-out infinite alternate"></div>'
  ).join('');
}

function renderCycle(){
  const body=$('cycle-body');if(!body)return;
  const t=track();
  if(S.tab==='signal'){
    const live=S.broadcasting;
    body.innerHTML=
      '<button id="bcast-btn" class="broadcast-btn'+(live?' live':'')+'">'+
      (live?'&#9673; END BROADCAST':'&#9678; GO LIVE — THE SIGNAL')+'</button>'+
      '<div class="c-row"><span class="c-lbl">STATUS</span><span class="c-val'+(live?' live':'')+'">'+
      (live?'LIVE':'OFFLINE')+'</span></div>'+
      '<div class="c-row"><span class="c-lbl">TIMER</span><span id="bcast-timer" class="c-val">'+(live?fl(S.btime):'&#8212;')+'</span></div>'+
      '<div class="c-row"><span class="c-lbl">VIEWERS</span><span class="c-val">'+(live?'3':'&#8212;')+'</span></div>'+
      '<div class="c-row"><span class="c-lbl">VIDEO</span><span class="c-val">OFF</span></div>';
    $('bcast-btn').addEventListener('click',()=>{
      S.broadcasting=!S.broadcasting;
      if(!S.broadcasting)S.btime=0;
      updateSignalBtns();renderCycle();
    });
  }else if(S.tab==='analytics'){
    body.innerHTML=
      '<div style="font-size:7px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ts);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.title+'</div>'+
      '<div class="c-row"><span class="c-lbl">PLAYS</span><span class="c-val hi">247</span></div>'+
      '<div class="c-row"><span class="c-lbl">DOWNLOADS</span><span class="c-val">12</span></div>'+
      '<div class="c-row"><span class="c-lbl">REVENUE</span><span class="c-val hi">$180</span></div>'+
      '<div class="c-row"><span class="c-lbl">MASTERS</span><span class="c-val">8 heard</span></div>'+
      '<div class="c-row"><span class="c-lbl">MUSES</span><span class="c-val">3 heard</span></div>'+
      '<div class="c-row"><span class="c-lbl">ALL TIME</span><span class="c-val hi">1,847</span></div>';
  }else if(S.tab==='msgs'){
    const msgs=[['#00e5ff','MESSAGE L'],['#ffb347','MESSAGE MASTERS'],['#cc44aa','MESSAGE MUSES'],['#888','MESSAGE COLLAB'],['var(--red)','VOICE NOTE — TRACK']];
    body.innerHTML=msgs.map(([c,lbl])=>
      '<button class="msg-btn"><div class="msg-dot" style="background:'+c+'"></div>'+lbl+'</button>'
    ).join('');
  }else if(S.tab==='system'){
    body.innerHTML=
      Object.entries(S.sys).map(([k,v])=>
        '<div class="c-row"><span class="c-lbl">'+k+'</span>'+
        '<div class="pill'+(v?' on':'')+'" data-sys="'+k+'"><div class="pill-k"></div></div></div>'
      ).join('')+
      '<div class="c-row" style="margin-top:6px">'+
      '<button class="sys-action">PROFILE</button>'+
      '<button class="sys-action">LOGOUT</button></div>'+
      '<div style="font-size:7px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--tm);margin-top:8px;margin-bottom:4px">M³</div>'+
      '<div class="m3g">'+
      [['12','MASTERS','#ffb347'],['89','MEMBERS',''],['5','MUSES','#cc44aa'],['3','COLLAB','']].map(([n,l,c])=>
        '<div class="m3c"><span class="m3n"'+(c?' style="color:'+c+'"':'')+'>'+n+'</span><span class="m3lbl">'+l+'</span></div>'
      ).join('')+'</div>';
    body.querySelectorAll('.pill').forEach(pill=>{
      pill.addEventListener('click',()=>{
        S.sys[pill.dataset.sys]=!S.sys[pill.dataset.sys];renderCycle();
      });
    });
  }
}

function updateSignalBtns(){
  const btn=$('signal-btn');if(!btn)return;
  btn.className='signal-btn'+(S.broadcasting?' live':'');
  btn.innerHTML=S.broadcasting?'&#9673; ON AIR':'&#9678; THE SIGNAL';
}

function handlePad(n){
  if(S.armed===n){S.armed=null;}
  else if(S.cues[n]!==undefined){S.progress=S.cues[n];S.armed=null;drawWaveform();updateTransport();updateHero();}
  else{S.armed=n;}
  updatePads();updateArmedInd();
}

function handleSeek(pos){
  if(S.armed!==null){S.cues[S.armed]=pos;S.armed=null;updatePads();updateArmedInd();}
  else{S.progress=pos;}
  drawWaveform();updateTransport();updateHero();
}

function loadTrack(idx){
  S.tidx=idx;S.progress=0;S.cues={};S.armed=null;
  computeBars(track());
  updateHero();buildBinsTracks();buildMonitorTracks();
  updatePads();updateArmedInd();drawWaveform();updateTransport();
  if(S.tab==='analytics')renderCycle();
}

function wireEvents(){
  // Cursor
  const ball=$('cur-ball'),spot=$('cur-spot');
  document.addEventListener('mousemove',e=>{
    ball.style.left=e.clientX+'px';ball.style.top=e.clientY+'px';
    spot.style.left=e.clientX+'px';spot.style.top=e.clientY+'px';
  });
  document.addEventListener('mousedown',()=>ball.classList.add('click'));
  document.addEventListener('mouseup',()=>ball.classList.remove('click'));
  // Keyboard
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    if(e.code==='Space'){e.preventDefault();S.playing=!S.playing;updateTransport();}
  });
  // Vault
  $('vault-list').addEventListener('click',e=>{
    const row=e.target.closest('[data-vid]');if(!row)return;
    S.vault=row.dataset.vid;buildVaults();
  });
  // Bins tracks
  $('bins-tracks').addEventListener('click',e=>{
    const row=e.target.closest('[data-tidx]');if(!row)return;
    loadTrack(parseInt(row.dataset.tidx));
  });
  // Waveform
  $('wf-canvas').addEventListener('click',e=>{
    const r=e.currentTarget.getBoundingClientRect();
    handleSeek((e.clientX-r.left)/r.width);
  });
  // Cycle tabs
  $('cycle-tabs').addEventListener('click',e=>{
    const tab=e.target.closest('[data-tab]');if(!tab)return;
    S.tab=tab.dataset.tab;
    document.querySelectorAll('.ctab').forEach(t=>t.classList.toggle('on',t===tab));
    renderCycle();
  });
  // Signal btn (rail)
  $('signal-btn').addEventListener('click',()=>{
    S.broadcasting=!S.broadcasting;if(!S.broadcasting)S.btime=0;
    updateSignalBtns();if(S.tab==='signal')renderCycle();
  });
  // Transport
  $('play-btn').addEventListener('click',()=>{S.playing=!S.playing;updateTransport();});
  $('prev-btn').addEventListener('click',()=>loadTrack((S.tidx-1+TRACKS.length)%TRACKS.length));
  $('next-btn').addEventListener('click',()=>loadTrack((S.tidx+1)%TRACKS.length));
  $('loop-btn').addEventListener('click',()=>{S.loop=!S.loop;updateTransport();});
  $('cue-btn').addEventListener('click',()=>{S.progress=0;drawWaveform();updateTransport();updateHero();});
  $('prog-bar').addEventListener('click',e=>{
    const r=e.currentTarget.getBoundingClientRect();
    handleSeek((e.clientX-r.left)/r.width);
  });
}

function startTimers(){
  setInterval(()=>{
    $('r-clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
  },1000);
  setInterval(()=>{
    S.sessec++;$('r-sess').textContent='SESSION '+fl(S.sessec);
  },1000);
  setInterval(()=>{
    if(!S.playing)return;
    const tot=ds(track().dur);
    S.progress+=1/tot;
    if(S.progress>=1){
      if(S.loop){S.progress=0;}
      else{S.progress=1;S.playing=false;}
    }
    drawWaveform();updateTransport();updateHero();
  },1000);
  setInterval(()=>{
    if(!S.broadcasting)return;
    S.btime++;
    if(S.tab==='signal'){const bt=$('bcast-timer');if(bt)bt.textContent=fl(S.btime);}
  },1000);
}

// INIT
computeBars(track());
buildAurora();
buildVaults();
buildPads();
buildBinsTracks();
buildMonitorTracks();
updateHero();
updateTransport();
renderCycle();
wireEvents();
startTimers();
// Sync clock immediately
$('r-clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
// Initial waveform
requestAnimationFrame(drawWaveform);
</script>
</body>
</html>
