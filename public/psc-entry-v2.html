<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;cursor:none;}
#dp-canvas{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;}
.cur-ball{position:fixed;pointer-events:none;z-index:9999;width:7px;height:7px;border-radius:50%;background:rgba(232,228,222,.7);transform:translate(-50%,-50%);transition:width 60ms,height 60ms;}
.cur-ring{position:fixed;pointer-events:none;z-index:9998;width:26px;height:26px;border-radius:50%;border:1px solid rgba(232,228,222,.14);transform:translate(-50%,-50%);transition:width 150ms,height 150ms;}

/* WORDMARK — top left, locked position forever */
.wordmark{
  position:fixed;top:28px;left:32px;z-index:20;
  font-family:'Comfortaa',sans-serif;font-weight:700;
  font-size:15px;letter-spacing:.16em;
  color:rgba(232,228,222,.32);
  user-select:none;
}
.wordmark span{font-size:22px;}

/* CENTER — REQUEST VAULT ACCESS */
.center-form{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:20;display:flex;flex-direction:column;align-items:center;gap:18px;
  opacity:0;animation:fadeIn .7s ease .3s forwards;
}
@keyframes fadeIn{to{opacity:1}}
.form-label{
  font-family:'Chakra Petch',monospace;font-size:8px;font-weight:600;
  letter-spacing:.42em;text-transform:uppercase;
  color:rgba(255,255,255,.22);
}
.form-input-wrap{position:relative;width:280px;}
.form-input{
  width:100%;background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.18);
  padding:13px 16px;
  font-family:'Chakra Petch',monospace;font-size:12px;
  color:rgba(232,228,222,.8);outline:none;
  letter-spacing:.06em;
  text-align:center;
  transition:border-color 200ms,background 200ms;
}
.form-input::placeholder{color:rgba(255,255,255,.2);font-size:10px;letter-spacing:.24em;}
.form-input:focus{
  border-color:rgba(255,255,255,.2);
  border-bottom-color:rgba(255,255,255,.4);
  background:rgba(255,255,255,.04);
}
.form-btn{
  width:280px;padding:12px 0;
  background:transparent;border:1px solid rgba(255,255,255,.12);
  font-family:'Chakra Petch',monospace;font-size:9px;font-weight:600;
  letter-spacing:.32em;text-transform:uppercase;
  color:rgba(255,255,255,.35);cursor:none;
  transition:border-color 200ms,color 200ms,background 200ms;
}
.form-btn:hover{border-color:rgba(255,255,255,.3);color:rgba(232,228,222,.7);background:rgba(255,255,255,.03);}

/* BOTTOM LEFT — ENTER ACCESS CODE */
.code-corner{
  position:fixed;bottom:28px;right:32px;z-index:20;align-items:flex-end;
  display:flex;flex-direction:column;gap:12px;
  opacity:0;animation:fadeIn .7s ease .5s forwards;
}
.code-label{
  font-family:'Chakra Petch',monospace;font-size:8px;font-weight:600;
  letter-spacing:.42em;text-transform:uppercase;
  color:rgba(255,255,255,.22);
}
.cells{display:flex;gap:8px;align-items:center;}
.cell{
  width:40px;height:50px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.015);
  display:flex;align-items:center;justify-content:center;
  font-family:'Chakra Petch',monospace;font-size:20px;font-weight:700;
  color:rgba(255,255,255,.85);
  position:relative;overflow:hidden;
  transition:border-color 180ms,background 180ms;
}
.cell.active{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.035);}
.cell.active::before{
  content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;
  background:rgba(255,255,255,.28);
  animation:blink 1.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.cell.correct{border-color:rgba(255,179,71,.4);background:rgba(255,179,71,.04);}
.cell.correct::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,179,71,.55);}
.cell.wrong{border-color:rgba(200,40,0,.4);background:rgba(200,40,0,.03);}
.err{
  font-family:'Chakra Petch',monospace;font-size:8px;font-weight:500;
  letter-spacing:.22em;text-transform:uppercase;color:rgba(200,40,0,.65);
  height:14px;
}

/* GATE PANELS */
.gate{position:fixed;top:0;bottom:0;width:50%;background:rgba(0,0,0,.5);z-index:8;transition:transform 1.1s cubic-bezier(.76,0,.24,1),opacity .8s ease;}
.gate-l{left:0;}.gate-r{right:0;}
.gate-l.open{transform:translateX(-100%);}
.gate-r.open{transform:translateX(100%);}
</style>
</head>
<body>
<canvas id="dp-canvas"></canvas>
<div class="gate gate-l" id="gate-l"></div>
<div class="gate gate-r" id="gate-r"></div>

<!-- WORDMARK — top left, forever -->
<div class="wordmark">pleasant<span>soul</span>collective</div>

<!-- CENTER — REQUEST VAULT ACCESS -->
<div class="center-form">
  <div class="form-input-wrap">
    <input class="form-input" type="text" placeholder="PHONE OR EMAIL" id="access-input" autocomplete="off" spellcheck="false"/>
  </div>
  <button class="form-btn">Request Access</button>
</div>

<!-- BOTTOM LEFT — ENTER ACCESS CODE -->
<div class="code-corner">
  <div class="cells" id="cells"></div>
  <div class="err" id="err"></div>
</div>

<div class="cur-ring" id="cur-ring"></div>
<div class="cur-ball" id="cur-ball"></div>

<script>
/* CURSOR */
(function(){
  const b=document.getElementById('cur-ball'),r=document.getElementById('cur-ring');
  document.addEventListener('mousemove',e=>{b.style.left=e.clientX+'px';b.style.top=e.clientY+'px';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';});
})();

/* DP WALLPAPER — exact from design file */
(async function(){
  const canvas=document.getElementById('dp-canvas');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',()=>{resize();draw();});
  async function draw(){
    try{await document.fonts.load('700 40px Comfortaa');}catch(e){}
    const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    const FS=40,CW=110,CH=80;
    const COLS=Math.ceil(W/CW)+3,ROWS=Math.ceil(H/CH)+3;
    ctx.font=`700 ${FS}px Comfortaa`;ctx.textAlign='center';ctx.textBaseline='middle';
    const passes=[
      {ox:1.5,oy:1.5,fill:'rgba(0,0,0,0.97)'},
      {ox:0,oy:0,fill:'rgba(14,12,10,0.91)'},
      {ox:-.8,oy:-.8,fill:'rgba(24,21,17,0.75)'},
    ];
    for(let row=-1;row<ROWS;row++){
      const odd=row%2!==0;
      for(let col=-1;col<COLS;col++){
        const cx=col*CW+(odd?CW/2:0)+CW/2,cy=row*CH+CH/2,mir=(row+col)%2!==0;
        passes.forEach(p=>{
          ctx.save();ctx.translate(cx+p.ox,cy+p.oy);
          if(mir)ctx.scale(-1,1);
          ctx.fillStyle=p.fill;ctx.fillText('dp',0,0);ctx.restore();
        });
      }
    }
  }
  draw();

  /* one glyph at a time, low→high frequency spectrum, like a waveform moving through the room */
  const SERATO=['#e52020','#e56020','#e5a020','#14dc14','#00c8dc','#1464dc','#8c14dc','#e5e5e5'];
  let seratoIdx=0;
  function collectPositions(){
    const pos=[];
    const W=canvas.width,H=canvas.height;
    const CW=110,CH=80;
    const COLS=Math.ceil(W/CW)+3,ROWS=Math.ceil(H/CH)+3;
    for(let row=-1;row<ROWS;row++){
      const odd=row%2!==0;
      for(let col=-1;col<COLS;col++){
        pos.push({
          x:col*CW+(odd?CW/2:0)+CW/2,
          y:row*CH+CH/2,
          mir:(row+col)%2!==0
        });
      }
    }
    return pos;
  }
  function glowOne(colorHex, onDone){
    const positions=collectPositions();
    const ctx=canvas.getContext('2d');
    const pos=positions[Math.floor(Math.random()*positions.length)];
    const hex=colorHex.replace('#','');
    const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    const passes=[{ox:1.5,oy:1.5,fill:'rgba(0,0,0,0.97)'},{ox:0,oy:0,fill:'rgba(14,12,10,0.91)'},{ox:-.8,oy:-.8,fill:'rgba(24,21,17,0.75)'}];
    const holdFrames=30+Math.floor(Math.random()*90);
    let alpha=0,phase='in',held=0;
    const step=()=>{
      ctx.save();ctx.globalCompositeOperation='source-over';
      ctx.font='700 40px Comfortaa';ctx.textAlign='center';ctx.textBaseline='middle';
      passes.forEach(p=>{
        ctx.save();ctx.translate(pos.x+p.ox,pos.y+p.oy);
        if(pos.mir)ctx.scale(-1,1);
        ctx.fillStyle=p.fill;ctx.fillText('dp',0,0);ctx.restore();
      });
      ctx.save();ctx.translate(pos.x,pos.y);
      if(pos.mir)ctx.scale(-1,1);
      ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
      ctx.fillText('dp',0,0);ctx.restore();
      ctx.restore();
      if(phase==='in'){
        alpha+=0.005;
        if(alpha>=0.45){alpha=0.45;phase='hold';}
      } else if(phase==='hold'){
        held++;
        if(held>=holdFrames) phase='out';
      } else {
        alpha-=0.0025;
        if(alpha<=0){onDone();return;}
      }
      requestAnimationFrame(step);
    };
    step();
  }
  function runLoop(idx){
    glowOne(SERATO[idx%SERATO.length], ()=>{
      setTimeout(()=>runLoop(idx+1), 50);
    });
  }
  setTimeout(()=>runLoop(0), 1000);
})();

/* CODE ENTRY */
(function(){
  const CODES={'0528':'console','7677':'console'};
  const LEN=4;let input='',unlocked=false;
  const cellsEl=document.getElementById('cells'),errEl=document.getElementById('err');
  const cells=Array.from({length:LEN},(_,i)=>{
    const d=document.createElement('div');
    d.className='cell'+(i===0?' active':'');
    cellsEl.appendChild(d);return d;
  });
  function render(){
    cells.forEach((c,i)=>{
      Array.from(c.childNodes).forEach(n=>{if(n.nodeType===3)c.removeChild(n);});
      if(input[i])c.prepend(document.createTextNode(input[i]));
      c.classList.toggle('active',i===input.length&&!unlocked);
      c.classList.remove('correct','wrong');
    });
    errEl.textContent='';
  }
  function attempt(){
    if(CODES[input]){
      unlocked=true;
      cells.forEach(c=>{c.classList.remove('wrong');c.classList.add('correct');});
      setTimeout(()=>{document.getElementById('gate-l').classList.add('open');document.getElementById('gate-r').classList.add('open');},300);
    } else {
      cells.forEach(c=>c.classList.add('wrong'));
      errEl.textContent='ACCESS DENIED';
      setTimeout(()=>{input='';render();},900);
    }
  }
  document.addEventListener('keydown',e=>{
    if(unlocked)return;
    if(e.key==='Backspace'){input=input.slice(0,-1);render();}
    else if(e.key==='Enter'&&input.length===LEN){attempt();}
    else if(input.length<LEN&&/[0-9]/.test(e.key)){input+=e.key;render();if(input.length===LEN)setTimeout(attempt,120);}
  });
  render();
})();
</script>
</body>
</html>
