<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC // Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
:root{--void:#000;--tp:#e8e4de;--ts:#3a3a3a;--tm:#1e1e1e;--b1:#111;}
html,body,#root{width:100vw;height:100vh;overflow:hidden;background:var(--void);color:var(--tp);font-family:'Syne',sans-serif;}
body{cursor:none;}
::-webkit-scrollbar{display:none;}

#dp-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.dp-veil{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.72);pointer-events:none;}

/* cursor */
.cur-ring{position:fixed;z-index:9999;pointer-events:none;width:28px;height:28px;border-radius:50%;border:1px solid rgba(232,228,222,.15);transform:translate(-50%,-50%);transition:border-color 300ms,width 150ms,height 150ms;}
.cur-ball{position:fixed;z-index:9999;pointer-events:none;width:7px;height:7px;border-radius:50%;background:rgba(232,228,222,.7);transform:translate(-50%,-50%);transition:width 60ms,height 60ms,background 300ms;}

.shell{position:relative;z-index:2;display:flex;flex-direction:column;width:100vw;height:100vh;}

/* NAV */
.nav{
  height:60px;min-height:60px;display:flex;align-items:center;
  padding:0 40px;border-bottom:1px solid rgba(255,255,255,.035);
  position:relative;z-index:10;flex-shrink:0;
}
.nav-dp{font-family:'Comfortaa',sans-serif;font-size:16px;font-weight:700;color:rgba(232,228,222,.85);letter-spacing:-.01em;}
.nav-div{width:1px;height:14px;background:rgba(255,255,255,.07);margin:0 16px;flex-shrink:0;}
.nav-psc{font-family:'Comfortaa',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2);}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:14px;}
.nav-lbl{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.18);}
.live-dot{width:4px;height:4px;border-radius:50%;background:rgba(200,40,0,.5);animation:lp 1.6s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:.2}50%{opacity:1}}
.nav-clock{font-family:'SF Mono','Monaco',monospace;font-size:9px;color:rgba(255,255,255,.15);}

/* arch access — subtle pill top-right */
.arch-pill{
  font-size:8px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  padding:5px 12px;border:1px solid rgba(0,229,255,.18);
  color:rgba(0,229,255,.35);cursor:none;
  transition:border-color 250ms,color 250ms;
}
.arch-pill:hover{border-color:rgba(0,229,255,.5);color:rgba(0,229,255,.7);}

/* STAGE */
.stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}

/* D VAULT — dominant card */
.d-vault{
  width:520px;height:320px;
  background:rgba(4,3,2,.88);
  border:1px solid rgba(255,255,255,.05);
  position:relative;overflow:hidden;cursor:none;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:32px 36px;
  transition:border-color 400ms;
}
.d-vault:hover{border-color:rgba(255,179,71,.18);}
.d-vault:hover .dv-bloom{opacity:1;}
.d-vault:hover .dv-bar{opacity:.8;}
.d-vault:hover .dv-enter{opacity:.5;}
.d-vault:hover .dv-name{opacity:1;color:#ffb347;}

.dv-bar{position:absolute;top:0;left:0;right:0;height:1px;background:#ffb347;opacity:.25;transition:opacity 400ms;}
.dv-bloom{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 120% at 30% 100%,rgba(255,179,71,.09) 0%,transparent 65%);
  opacity:0;transition:opacity 400ms cubic-bezier(.25,0,0,1);
}

/* dp texture on the vault card */
.dv-texture{position:absolute;inset:0;z-index:0;}

.dv-content{position:relative;z-index:2;}
.dv-mark{font-family:'Comfortaa',sans-serif;font-size:48px;font-weight:700;color:rgba(255,255,255,.025);line-height:1;margin-bottom:20px;letter-spacing:-.02em;user-select:none;}
.dv-name{
  font-size:36px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(232,228,222,.7);line-height:1;margin-bottom:10px;
  transition:color 400ms,opacity 400ms;
}
.dv-meta{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:18px;}
.dv-enter{
  display:flex;align-items:center;gap:10px;
  font-size:9px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
  color:#ffb347;opacity:0;transition:opacity 400ms;
}
.dv-enter::before{content:'';width:18px;height:1px;background:#ffb347;}
.dv-amber-dot{width:5px;height:5px;border-radius:50%;background:#ffb347;margin-bottom:14px;transition:box-shadow 400ms;}
.d-vault:hover .dv-amber-dot{box-shadow:0 0 10px #ffb347,0 0 24px rgba(255,179,71,.4);}

/* LOCKBOXES — 4 dots, bottom center, barely there */
.lockboxes{
  position:absolute;bottom:36px;left:0;right:0;
  display:flex;justify-content:center;gap:20px;
  align-items:center;
}
.lb-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.08);
  cursor:none;position:relative;
  transition:background 350ms,box-shadow 350ms;
}
.lb-dot:hover{background:var(--lc);box-shadow:0 0 8px var(--lc),0 0 18px rgba(255,255,255,.1);}
.lb-tooltip{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.35);white-space:nowrap;
  opacity:0;transition:opacity 250ms;pointer-events:none;
}
.lb-dot:hover .lb-tooltip{opacity:1;}

/* STATUS */
.status-bar{
  height:40px;min-height:40px;display:flex;align-items:center;
  padding:0 40px;gap:20px;border-top:1px solid rgba(255,255,255,.025);flex-shrink:0;
}
.st-item{display:flex;align-items:center;gap:7px;}
.st-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.12);}
.st-dot.ok{background:rgba(40,160,80,.4);}
.st-txt{font-size:8px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.14);}
.st-r{margin-left:auto;font-size:8px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.07);}

/* sealed intro */
.sealed{position:fixed;inset:0;z-index:100;background:#000;animation:us 1s cubic-bezier(.25,0,0,1) .2s forwards;pointer-events:none;}
@keyframes us{0%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<canvas id="dp-canvas"></canvas>
<div class="dp-veil"></div>
<div id="root"></div>

<script>
(async function(){
  const c=document.getElementById('dp-canvas');
  function rsz(){c.width=window.innerWidth;c.height=window.innerHeight;}
  rsz(); window.addEventListener('resize',()=>{rsz();draw();});
  async function draw(){
    try{await document.fonts.load('700 40px Comfortaa');}catch(e){}
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    const FS=54,CW=110,CH=80;
    const COLS=Math.ceil(W/CW)+3,ROWS=Math.ceil(H/CH)+3;
    ctx.font=`700 ${FS}px Comfortaa`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const passes=[
      {ox:1.5,oy:1.5,fill:'rgba(0,0,0,0.97)'},
      {ox:0,oy:0,fill:'rgba(14,12,10,0.91)'},
      {ox:-.8,oy:-.8,fill:'rgba(24,21,17,0.75)'},
    ];
    for(let row=-1;row<ROWS;row++){
      const odd=row%2!==0;
      for(let col=-1;col<COLS;col++){
        const cx=col*CW+(odd?CW/2:0)+CW/2,cy=row*CH+CH/2;
        const mir=(row+col)%2!==0;
        passes.forEach(p=>{
          ctx.save();ctx.translate(cx+p.ox,cy+p.oy);
          if(mir)ctx.scale(-1,1);
          ctx.fillStyle=p.fill;ctx.fillText('dp',0,0);
          ctx.restore();
        });
      }
    }
  }
  draw();
})();
</script>

<script type="text/babel">
const {useState,useEffect,useRef}=React;

const LOCKBOXES=[
  {id:'larry', name:'LARRY', color:'#7aaa5a'},
  {id:'janet', name:'JANET', color:'#cc3399'},
  {id:'erikah',name:'ERIKAH',color:'#cc6633'},
  {id:'drake', name:'DRAKE', color:'#c4a428'},
];

function Cursor(){
  const ball=useRef(),ring=useRef();
  const [col,setCol]=useState(null);
  useEffect(()=>{
    const mv=e=>{
      if(ball.current){ball.current.style.left=e.clientX+'px';ball.current.style.top=e.clientY+'px';}
      if(ring.current){ring.current.style.left=e.clientX+'px';ring.current.style.top=e.clientY+'px';}
    };
    window.addEventListener('mousemove',mv);
    return()=>window.removeEventListener('mousemove',mv);
  },[]);
  window.__setCursorColor=(c)=>setCol(c);
  return<>
    <div ref={ring} className="cur-ring" style={col?{borderColor:`rgba(${hexRgb(col)},.4)`}:{}}/>
    <div ref={ball} className="cur-ball" style={col?{background:col}:{}}/>
  </>;
}

function hexRgb(h){return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

function Nav(){
  const[clk,setClk]=useState(()=>new Date().toLocaleTimeString('en-US',{hour12:false}));
  useEffect(()=>{const t=setInterval(()=>setClk(new Date().toLocaleTimeString('en-US',{hour12:false})),1000);return()=>clearInterval(t);},[]);
  return(
    <div className="nav">
      <span className="nav-dp">dp</span>
      <div className="nav-div"/>
      <span className="nav-psc">Pleasant Soul Collective</span>
      <div className="nav-r">
        <div style={{display:'flex',alignItems:'center',gap:6}}><div className="live-dot"/><span className="nav-lbl">LIVE</span></div>
        <div style={{width:1,height:12,background:'rgba(255,255,255,.06)'}}/>
        <span className="nav-clock">{clk}</span>
        <div style={{width:1,height:12,background:'rgba(255,255,255,.06)'}}/>
        <div className="arch-pill" onClick={()=>window.location.href='PSC Console.html?vault=l'}>ARCHITECT</div>
      </div>
    </div>
  );
}

/* dp texture canvas per card */
function DPTexture({hover}){
  const cv=useRef();
  useEffect(()=>{
    const c=cv.current;if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);
    const FS=28,CW=64,CH=48;
    ctx.font=`700 ${FS}px Comfortaa`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const ROWS=Math.ceil(H/CH)+2,COLS=Math.ceil(W/CW)+2;
    for(let row=-1;row<ROWS;row++){
      const odd=row%2!==0;
      for(let col=-1;col<COLS;col++){
        const cx=col*CW+(odd?CW/2:0)+CW/2,cy=row*CH+CH/2;
        const mir=(row+col)%2!==0;
        ctx.save();ctx.translate(cx,cy);if(mir)ctx.scale(-1,1);
        ctx.fillStyle=hover?'rgba(255,179,71,0.022)':'rgba(255,255,255,0.018)';
        ctx.fillText('dp',0,0);ctx.restore();
      }
    }
  },[hover]);
  return<canvas ref={cv} width={520} height={320} className="dv-texture" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>;
}

function DVaultCard(){
  const[hov,setHov]=useState(false);
  return(
    <div className="d-vault"
      onMouseEnter={()=>{setHov(true);window.__setCursorColor&&window.__setCursorColor('#ffb347');}}
      onMouseLeave={()=>{setHov(false);window.__setCursorColor&&window.__setCursorColor(null);}}
      onClick={()=>window.location.href='PSC Console.html?vault=d8p'}>
      <div className="dv-bar"/>
      <div className="dv-bloom"/>
      <DPTexture hover={hov}/>
      <div className="dv-content">
        <div className="dv-mark">dp</div>
        <div className="dv-amber-dot"/>
        <div className="dv-name">D8P</div>
        <div className="dv-meta">9 TRACKS · UNRELEASED</div>
        <div className="dv-enter">ENTER VAULT</div>
      </div>
    </div>
  );
}

function Lockboxes(){
  return(
    <div className="lockboxes">
      {LOCKBOXES.map(lb=>(
        <div key={lb.id} className="lb-dot" style={{'--lc':lb.color}}
          onMouseEnter={()=>window.__setCursorColor&&window.__setCursorColor(lb.color)}
          onMouseLeave={()=>window.__setCursorColor&&window.__setCursorColor(null)}>
          <span className="lb-tooltip">{lb.name}</span>
        </div>
      ))}
    </div>
  );
}

function App(){
  return(
    <div className="shell">
      <div className="sealed"/>
      <Cursor/>
      <Nav/>
      <div className="stage">
        <DVaultCard/>
        <Lockboxes/>
      </div>
      <div className="status-bar">
        <div className="st-item"><div className="st-dot ok"/><span className="st-txt">SYSTEM ONLINE</span></div>
        <div className="st-item"><div className="st-dot ok"/><span className="st-txt">9 TRACKS LOADED</span></div>
        <div className="st-item"><div className="st-dot"/><span className="st-txt">LOCKBOXES SEALED</span></div>
        <span className="st-r">PSC · 2026</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
