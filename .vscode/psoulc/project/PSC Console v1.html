<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC // Console</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root {
  --void:          #000000;
  --surface:       #050505;
  --surface-raised:#090909;
  --border:        #181818;
  --border-dim:    #111111;
  --text-primary:  #f0ede8;
  --text-secondary:#555555;
  --text-muted:    #282828;
  --record-red:    #cc2200;
  --font-ui:       'Chakra Petch', sans-serif;
  --font-mono:     'SF Mono', 'Monaco', monospace;
  /* identity — overridden by theme JS */
  --id:            #ffb347;
  --id-dim:        rgba(255,179,71,0.10);
  --id-glow:       0 0 20px rgba(255,179,71,0.22);
  --surface-bins:  #030201;
  --surface-chain: #020203;
  --text-p:        #f5ead8;
  --gold:          #d4890a;
  --pale:          #ffe4a0;
}

* { margin:0; padding:0; box-sizing:border-box; border-radius:0; }
.pill, .pill * { border-radius: 9999px; }
.circle { border-radius: 50%; }

html, body, #root {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--void);
  color: var(--text-p);
  font-family: var(--font-ui);
}
body { cursor: none; }

::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

/* ── LAYOUT ─────────────────────────────────────── */
.console { display:flex; flex-direction:column; width:100vw; height:100vh; }

.rail {
  height: 30px; min-height: 30px; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  background: var(--void);
  border-bottom: 1px solid var(--border-dim);
  padding: 0 14px; position: relative; z-index: 20;
}
.rail-sep { width:1px; height:12px; background:var(--border); flex-shrink:0; }
.rail-brand { font-family:'Comfortaa',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.02em; color:var(--id); }
.rail-lbl { font-size:9px; font-weight:500; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-secondary); }
.rail-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.rail-bpm { font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--id); letter-spacing:0.04em; }
.rail-clock { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); }
.live-dot { width:5px; height:5px; background:var(--record-red); animation: recpulse 1.6s ease-in-out infinite; flex-shrink:0; }
@keyframes recpulse { 0%,100%{opacity:.25} 50%{opacity:1} }

.voice-btn {
  width:20px; height:20px; border:1px solid var(--border);
  background:transparent; color:var(--text-secondary);
  font-size:10px; cursor:none; display:flex; align-items:center; justify-content:center;
  transition: border-color 120ms, color 120ms;
}
.voice-btn:hover { border-color:var(--id); color:var(--id); }
.voice-btn.active { border-color:var(--id); color:var(--id); background:var(--id-dim); animation:recpulse .8s ease-in-out infinite; }

.arch-badge {
  font-size:8px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase;
  padding:2px 6px; border:1px solid var(--id); color:var(--id); background:var(--id-dim);
}

/* ── MAIN 3-COL ─────────────────────────────────── */
.console-main { display:flex; flex:1; min-height:0; overflow:hidden; }

/* BINS */
.bins {
  width:214px; min-width:214px; flex-shrink:0;
  background:var(--surface-bins);
  border-right:1px solid var(--border-dim);
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.bins::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:var(--id); opacity:.65;
}

.bins-hd {
  padding:8px 12px 7px 16px; border-bottom:1px solid var(--border-dim);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.bins-filter {
  display:flex; gap:3px; padding:5px 12px 5px 16px;
  border-bottom:1px solid var(--border-dim); flex-shrink:0;
}
.fchip {
  font-size:8px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
  padding:2px 5px; border:1px solid var(--border); color:var(--text-secondary);
  cursor:none; transition: all 120ms;
}
.fchip.on { border-color:var(--id); color:var(--id); background:var(--id-dim); }
.bins-list { flex:1; overflow-y:auto; }

.track-row {
  display:flex; align-items:center; gap:7px;
  padding:5px 12px 5px 16px; cursor:none;
  border-bottom:1px solid transparent; position:relative;
  transition: background 80ms;
}
.track-row:hover { background:rgba(255,255,255,0.02); }
.track-row.on { background:var(--id-dim); border-bottom-color:var(--border-dim); }
.track-row.on::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--id);
}
.tr-num { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); width:14px; flex-shrink:0; }
.tr-info { flex:1; min-width:0; }
.tr-title { font-size:11px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-p); line-height:1.3; }
.track-row.on .tr-title { color:var(--id); }
.tr-sub { font-size:9px; color:var(--text-secondary); margin-top:1px; }
.tr-bpm { font-family:var(--font-mono); font-size:9px; color:var(--text-secondary); flex-shrink:0; }
.stag {
  font-size:7px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  padding:1px 4px; flex-shrink:0;
}
.stag.unreleased { background:#0d0800; color:#996600; border:1px solid #221500; }
.stag.archive { background:#0a0a0a; color:#444; border:1px solid #1a1a1a; }
.stag.released { background:#060d06; color:#3a7a3a; border:1px solid #0f2010; }

.bins-wm {
  font-family:'Comfortaa',sans-serif; font-size:52px; font-weight:700;
  color:var(--text-p); opacity:0.018; text-align:center; padding:10px 0 8px;
  pointer-events:none; user-select:none; letter-spacing:-0.02em; flex-shrink:0;
}

/* vault list (L) */
.vault-row {
  display:flex; align-items:center; gap:8px;
  padding:7px 12px 7px 16px; cursor:none;
  border-bottom:1px solid var(--border-dim); transition:background 80ms;
}
.vault-row:hover { background:rgba(255,255,255,0.02); }
.vault-row.on { background:rgba(255,255,255,0.04); }
.vdot { width:6px; height:6px; flex-shrink:0; border-radius:50%; }
.vname { font-size:10px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-p); }
.vcnt { font-family:var(--font-mono); font-size:9px; color:var(--text-secondary); margin-left:auto; }

/* MONITOR */
.monitor {
  flex:1; background:#000; display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}
.aurora-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.abl { position:absolute; filter:blur(90px); mix-blend-mode:screen; border-radius:50%; }

.monitor-hero { padding:18px 28px 14px; position:relative; z-index:2; flex-shrink:0; }
.hero-badges { display:flex; gap:5px; margin-bottom:10px; }
.hbadge {
  font-size:8px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase;
  padding:2px 6px; border:1px solid;
}
.hbadge.unrel { border-color:var(--id); color:var(--id); background:var(--id-dim); }
.hbadge.vault { border-color:var(--border); color:var(--text-secondary); background:transparent; }
.hbadge.edit  { border-color:var(--id); color:var(--id); background:transparent; }

.hero-title {
  font-size: clamp(32px, 4vw, 54px);
  font-weight:700; line-height:1; letter-spacing:-0.01em;
  background:linear-gradient(90deg, var(--pale), var(--id), var(--gold), var(--pale));
  background-size:300% 100%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation: foil 5s linear infinite;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:8px;
}
@keyframes foil { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }

.hero-meta { display:flex; gap:14px; align-items:center; }
.hero-artist { font-size:13px; color:var(--text-secondary); }
.hero-key {
  font-family:var(--font-mono); font-size:10px; color:var(--text-secondary);
  background:var(--surface); border:1px solid var(--border); padding:1px 5px;
}
.hero-dur { font-family:var(--font-mono); font-size:11px; color:var(--id); margin-left:auto; }

/* waveform */
.wf-wrap { padding:0 28px; position:relative; z-index:2; flex-shrink:0; cursor:crosshair; }
.wf-canvas { width:100%; height:56px; display:block; }
.wf-times { display:flex; justify-content:space-between; padding:3px 0 6px; }
.wf-t { font-family:var(--font-mono); font-size:8px; color:var(--text-secondary); }

/* tracklist */
.tl-wrap { flex:1; overflow-y:auto; position:relative; z-index:2; }
.tl-hd {
  display:flex; gap:8px; padding:5px 28px;
  border-bottom:1px solid var(--border-dim); position:sticky; top:0;
  background:rgba(0,0,0,0.92); backdrop-filter:blur(4px);
}
.tl-hd span { font-size:8px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-secondary); }
.tl-row {
  display:flex; align-items:center; gap:8px; padding:5px 28px;
  cursor:none; transition:background 80ms;
}
.tl-row:hover { background:rgba(255,255,255,0.02); }
.tl-row.on { background:var(--id-dim); }
.tl-n { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); width:20px; flex-shrink:0; }
.tl-row.on .tl-n { color:var(--id); }
.tl-tit { flex:1; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-row.on .tl-tit { color:var(--id); font-weight:500; }
.tl-art { font-size:11px; color:var(--text-secondary); width:72px; overflow:hidden; text-overflow:ellipsis; }
.tl-bpm { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); width:30px; text-align:right; }
.tl-dur { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); width:34px; text-align:right; }

/* L monitor — no waveform, metadata panel instead */
.meta-panel { padding:0 28px 12px; position:relative; z-index:2; flex-shrink:0; }
.meta-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; }
.meta-cell { background:var(--surface); border:1px solid var(--border-dim); padding:7px 10px; }
.meta-cell.accent { border-color:var(--id); background:var(--id-dim); }
.meta-cell-lbl { font-size:7px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:3px; }
.meta-cell-val { font-size:13px; font-weight:600; font-family:var(--font-mono); color:var(--id); }
.meta-cell:not(.accent) .meta-cell-val { color:var(--text-p); font-size:12px; }

/* CHAIN */
.chain {
  width:188px; min-width:188px; flex-shrink:0;
  background:var(--surface-chain);
  border-left:1px solid var(--border-dim);
  display:flex; flex-direction:column; overflow:hidden;
}
.cblock { border-bottom:1px solid var(--border-dim); padding:7px 10px; flex-shrink:0; }
.cblock.grow { flex:1; overflow-y:auto; }
.cblbl { font-size:8px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:6px; }

.rdgrid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.rdcell {
  background:var(--void); border:1px solid var(--border-dim);
  padding:5px 6px; position:relative; overflow:hidden;
}
.rdcell.accent { border-color:var(--id); }
.rdcell::after {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 1px,rgba(0,0,0,0.2) 1px,rgba(0,0,0,0.2) 2px);
  pointer-events:none;
}
.rdlbl { font-size:7px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:2px; }
.rdval { font-family:var(--font-mono); font-size:15px; font-weight:600; line-height:1; }
.rdcell.accent .rdval { color:var(--id); }
.rdcell:not(.accent) .rdval { color:var(--text-p); font-size:13px; }

.padgrid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.pad {
  aspect-ratio:1; background:var(--void); border:1px solid var(--border-dim);
  display:flex; align-items:flex-end; padding:5px; cursor:none;
  font-size:8px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-secondary);
  transition: all 60ms; position:relative; overflow:hidden;
}
.pad:hover { border-color:var(--id); color:var(--id); }
.pad.on { border-color:var(--id); color:var(--id); }
.pad-bar { position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--id); transform:scaleX(0); transition:transform 60ms; }
.pad.on .pad-bar { transform:scaleX(1); }

.tog-row { display:flex; align-items:center; justify-content:space-between; padding:4px 0; cursor:none; }
.tog-lbl { font-size:9px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-secondary); }
.tog-pill {
  width:26px; height:13px; background:var(--border); border:1px solid var(--border);
  border-radius:9999px; position:relative; cursor:none; transition:all 200ms; flex-shrink:0;
}
.tog-pill.on { background:var(--id); border-color:var(--id); }
.tog-knob {
  position:absolute; width:9px; height:9px; background:#fff;
  top:1px; left:1px; border-radius:50%; transition:transform 200ms;
}
.tog-pill.on .tog-knob { transform:translateX(13px); }

.m3grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.m3c {
  background:var(--void); border:1px solid var(--border-dim); padding:5px 6px;
  font-size:8px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--text-secondary); cursor:none; transition:all 120ms;
}
.m3c.accent { border-color:var(--id); color:var(--id); background:var(--id-dim); }
.m3c:hover { border-color:var(--text-secondary); color:var(--text-p); }

/* edit fields (L) */
.ef {
  background:var(--void); border:1px solid var(--border-dim);
  padding:5px 7px; font-family:var(--font-ui); font-size:10px; color:var(--text-p);
  width:100%; outline:none; transition:border-color 120ms; margin-bottom:4px;
}
.ef:focus { border-color:var(--id); }
.ef::placeholder { color:var(--text-muted); }
.ebtn {
  background:var(--id-dim); border:1px solid var(--id); color:var(--id);
  font-family:var(--font-ui); font-size:8px; font-weight:500; letter-spacing:0.12em;
  text-transform:uppercase; padding:4px 8px; cursor:none; transition:background 120ms;
}
.ebtn:hover { background:rgba(255,255,255,0.08); }

/* telemetry */
.tele {
  display:flex; gap:5px; font-size:8px; font-family:var(--font-mono);
  padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.025); color:var(--text-secondary);
  align-items:flex-start;
}
.tele .ts { color:var(--text-muted); flex-shrink:0; }
.tele.ok { color:#336644; }
.tele.err { color:var(--record-red); }

/* TRANSPORT */
.transport {
  height:52px; min-height:52px; flex-shrink:0;
  background:var(--void); border-top:1px solid var(--border-dim);
  display:flex; align-items:center; padding:0 14px; gap:7px; z-index:20;
}
.tbtn {
  width:34px; height:34px; border:1px solid var(--border); background:transparent;
  color:var(--text-secondary); cursor:none; display:flex; align-items:center; justify-content:center;
  font-size:12px; transition:all 120ms; flex-shrink:0;
}
.tbtn:hover { border-color:var(--text-p); color:var(--text-p); }
.tbtn.play {
  width:42px; height:42px; font-size:14px;
  border-color:var(--id); color:var(--id);
}
.tbtn.play.on { background:var(--id-dim); }
.tbtn.active { border-color:var(--id); color:var(--id); background:var(--id-dim); }
.tbtn.sm { font-size:9px; font-weight:500; letter-spacing:0.1em; width:auto; padding:0 8px; }

.prog-track {
  flex:1; height:2px; background:var(--border); position:relative; cursor:crosshair; margin:0 6px;
}
.prog-fill { height:100%; background:var(--id); transition:width 200ms linear; }
.prog-head {
  position:absolute; top:50%; width:7px; height:7px; background:var(--id);
  transform:translate(-50%,-50%); pointer-events:none;
}
.t-time { font-family:var(--font-mono); font-size:12px; color:var(--id); letter-spacing:0.06em; flex-shrink:0; }
.t-total { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); flex-shrink:0; }

.gain-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; margin-left:6px; }
input[type=range].gain {
  -webkit-appearance:none; width:72px; height:2px; background:var(--border); outline:none; cursor:none;
}
input[type=range].gain::-webkit-slider-thumb {
  -webkit-appearance:none; width:7px; height:11px; background:var(--id); cursor:none;
}

/* VOICE TRANSCRIPT */
.vtranscript {
  position:fixed; bottom:64px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.95); border:1px solid var(--id);
  padding:7px 16px; font-size:11px; font-weight:500; color:var(--id);
  letter-spacing:0.1em; text-transform:uppercase; z-index:200;
  pointer-events:none;
}

/* CURSOR */
.cursor-ball {
  position:fixed; pointer-events:none; z-index:9999;
  width:11px; height:11px; border-radius:50%;
  background:var(--id); transform:translate(-50%,-50%);
  transition:width 60ms, height 60ms;
}
.cursor-ball.click { width:6px; height:6px; }
.cursor-spot {
  position:fixed; pointer-events:none; z-index:1;
  width:500px; height:500px; border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, var(--id-dim) 0%, transparent 70%);
}
</style>
</head>

<div id="root"></div>

/* ── UTILS ──────────────────────────────────────── */
const durSec = d => { const [m,s]=d.split(":").map(Number); return m*60+s; };
const secDur = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
function seedRand(n) { let s=n; return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return Math.abs(s)/2147483648; }; }

/* ── CURSOR ─────────────────────────────────────── */
function Cursor({ theme }) {
  const ballRef = useRef(); const spotRef = useRef();
  const [click, setClick] = useState(false);
  useEffect(() => {
    const mv = e => {
      const s = `left:${e.clientX}px;top:${e.clientY}px`;
      if(ballRef.current) { ballRef.current.style.left=e.clientX+"px"; ballRef.current.style.top=e.clientY+"px"; }
      if(spotRef.current) { spotRef.current.style.left=e.clientX+"px"; spotRef.current.style.top=e.clientY+"px"; }
    };
    const dn = () => setClick(true); const up = () => setClick(false);
    window.addEventListener("mousemove",mv); window.addEventListener("mousedown",dn); window.addEventListener("mouseup",up);
    return () => { window.removeEventListener("mousemove",mv); window.removeEventListener("mousedown",dn); window.removeEventListener("mouseup",up); };
  }, []);
  return <>
    <div ref={spotRef} className="cursor-spot" style={{background:`radial-gradient(circle, ${theme.idDim} 0%, transparent 70%)`}}/>
    <div ref={ballRef} className={`cursor-ball${click?" click":""}`}
      style={{background:theme.id, boxShadow:`0 0 8px ${theme.id}, 0 0 18px ${theme.id}`}}/>
  </>;
}

/* ── WAVEFORM ───────────────────────────────────── */
function Waveform({ track, progress, theme, onSeek }) {
  const cvs = useRef();
  const bars = useMemo(() => { const r=seedRand(track.id*9371); return Array.from({length:220},()=>0.12+r()*0.88); }, [track.id]);

  useEffect(() => {
    const c = cvs.current; if(!c) return;
    const ctx = c.getContext("2d");
    const W=c.width, H=c.height, bw=W/bars.length, px=W*progress;
    ctx.clearRect(0,0,W,H);
    bars.forEach((h,i) => {
      const x=i*bw, bh=h*H*0.86, y=(H-bh)/2;
      if(x<px) {
        const t=i/bars.length;
        ctx.fillStyle=`rgba(${Math.round(theme.idR*(0.7+t*0.3))},${Math.round(theme.idG*(0.25+t*0.55))},${theme.idB},0.82)`;
      } else { ctx.fillStyle="rgba(255,255,255,0.055)"; }
      ctx.fillRect(x+0.5,y,bw-0.8,bh);
    });
    ctx.fillStyle=theme.id; ctx.shadowColor=theme.id; ctx.shadowBlur=10;
    ctx.fillRect(px-1,0,2,H); ctx.shadowBlur=0;
    for(let y=0;y<H;y+=2){ctx.fillStyle="rgba(0,0,0,0.2)";ctx.fillRect(0,y,W,1);}
  }, [bars, progress, theme]);

  return <canvas ref={cvs} width={900} height={56} className="wf-canvas"
    onClick={e=>{ const r=e.currentTarget.getBoundingClientRect(); onSeek((e.clientX-r.left)/r.width); }}/>;
}

/* ── VOICE ENGINE ─────────────────────────────────── */
function useVoice(theme, onCmd) {
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState("");
  const synth = useRef(window.speechSynthesis);

  const speak = useCallback((text) => {
    if(!synth.current) return;
    synth.current.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.pitch = theme.voicePitch; u.rate = theme.voiceRate; u.volume = 0.9;
    synth.current.speak(u);
  }, [theme]);

  const listen = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) { speak("Speech recognition not supported in this browser."); return; }
    const rec = new SR();
    rec.lang = "en-US"; rec.interimResults = false;
    rec.onstart = () => setListening(true);
    rec.onresult = e => {
      const t = e.results[0][0].transcript.toLowerCase().trim();
      setTranscript(t); onCmd(t, speak); setTimeout(()=>setTranscript(""), 3000);
    };
    rec.onerror = rec.onend = () => setListening(false);
    rec.start();
  }, [onCmd, speak]);

  return { listening, transcript, speak, listen };
}

/* ── APP ─────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "console": "d",
  "aurora": true,
  "cursor": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const owner = tweaks.console;
  const theme = THEMES[owner];

  const [track, setTrack] = useState(TRACKS[0]);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [sessec, setSessec] = useState(0);
  const [activeVault, setActiveVault] = useState("d8p");

  /* apply CSS vars */
  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty("--id", theme.id);
    r.setProperty("--id-dim", theme.idDim);
    r.setProperty("--id-glow", theme.idGlow);
    r.setProperty("--surface-bins", theme.surfaceBins);
    r.setProperty("--surface-chain", theme.surfaceChain);
    r.setProperty("--text-p", theme.textP);
    r.setProperty("--gold", theme.gold);
    r.setProperty("--pale", theme.pale);
  }, [theme]);

  /* playback */
  useEffect(() => {
    if(!playing) return;
    const total = durSec(track.dur);
    const t = setInterval(() => setProgress(p => { if(p>=1){setPlaying(false);return 0;} return p+1/total; }), 1000);
    return () => clearInterval(t);
  }, [playing, track]);

  /* session clock */
  useEffect(() => { const t = setInterval(()=>setSessec(s=>s+1),1000); return ()=>clearInterval(t); }, []);

  /* keyboard */
  useEffect(() => {
    const h = e => {
      if(e.target.tagName==="INPUT") return;
      if(e.code==="Space"){ e.preventDefault(); setPlaying(p=>!p); }
      if(e.code==="KeyV") listen();
    };
    window.addEventListener("keydown",h); return()=>window.removeEventListener("keydown",h);
  });

  const handleCmd = useCallback((text, speak) => {
    if(text.includes("play")){setPlaying(true);speak(`Playing ${track.title}.`);}
    else if(text.includes("pause")||text.includes("stop")){setPlaying(false);speak("Paused.");}
    else if(text.includes("next")){
      const i=TRACKS.findIndex(t=>t.id===track.id); const nt=TRACKS[(i+1)%TRACKS.length];
      setTrack(nt);setProgress(0);speak(`Loading ${nt.title}. ${nt.bpm} BPM.`);
    }
    else if(text.includes("previous")||text.includes("back")){
      const i=TRACKS.findIndex(t=>t.id===track.id); const nt=TRACKS[(i-1+TRACKS.length)%TRACKS.length];
      setTrack(nt);setProgress(0);speak(`Loading ${nt.title}.`);
    }
    else if(text.includes("what")&&text.includes("playing")){
      speak(`Now playing ${track.title} by ${track.artist}. ${track.bpm} beats per minute, key of ${track.key}.`);
    }
    else if(text.includes("how many")){speak(`${TRACKS.length} tracks in the vault.`);}
    else {
      const m = TRACKS.find(t=>text.includes(t.title.toLowerCase().split(" ")[0]));
      if(m){setTrack(m);setProgress(0);speak(`Loading ${m.title}. ${m.bpm} BPM.`);}
      else speak("Command not recognized.");
    }
  }, [track]);

  const { listening, transcript, speak, listen } = useVoice(theme, handleCmd);

  const loadTrack = useCallback(t => { setTrack(t); setProgress(0); speak(`Loading ${t.title}. ${t.bpm} BPM.`); }, [speak]);
  const sessTime = `${String(Math.floor(sessec/3600)).padStart(2,"0")}:${String(Math.floor((sessec%3600)/60)).padStart(2,"0")}:${String(sessec%60).padStart(2,"0")}`;

  return (
    <div className="console">
      {tweaks.cursor && <Cursor theme={theme}/>}

      <Rail theme={theme} owner={owner} track={track} sessTime={sessTime} listening={listening} onVoice={listen}/>

      <div className="console-main">
        <Bins owner={owner} theme={theme} tracks={TRACKS} activeId={track.id} onSelect={loadTrack}
          activeVault={activeVault} onVaultSelect={setActiveVault}/>
        <Monitor owner={owner} track={track} progress={progress} theme={theme}
          onSeek={p=>setProgress(p)} aurora={tweaks.aurora}/>
        <Chain owner={owner} theme={theme} track={track}/>
      </div>

      <Transport theme={theme} track={track} playing={playing}
        onPlayPause={()=>setPlaying(p=>{if(!p)speak(`Playing ${track.title}`);return !p;})}
        progress={progress} onSeek={p=>setProgress(p)}
        onPrev={()=>{ const i=TRACKS.findIndex(t=>t.id===track.id); const nt=TRACKS[(i-1+TRACKS.length)%TRACKS.length]; loadTrack(nt); }}
        onNext={()=>{ const i=TRACKS.findIndex(t=>t.id===track.id); const nt=TRACKS[(i+1)%TRACKS.length]; loadTrack(nt); }}/>

      {transcript && (
        <div className="vtranscript" style={{borderColor:theme.id,color:theme.id}}>◎ {transcript}</div>
      )}

      <TweaksPanel>
        <TweakSection label="CONSOLE"/>
        <TweakRadio label="Artist" value={tweaks.console} options={["d","l"]} onChange={v=>setTweak("console",v)}/>
        <TweakSection label="DISPLAY"/>
        <TweakToggle label="Aurora blobs" value={tweaks.aurora} onChange={v=>setTweak("aurora",v)}/>
        <TweakToggle label="Custom cursor" value={tweaks.cursor} onChange={v=>setTweak("cursor",v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
