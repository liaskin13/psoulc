# Cloudflare Worker configuration for PSC audio upload + database proxy
name = "psc-upload-worker"
main = "upload-worker.js"
compatibility_date = "2024-01-01"

# D1 database binding
[[d1_databases]]
binding = "PSC_DB"
database_name = "psc-tracks"
database_id = "YOUR_D1_DATABASE_ID"  # Set after: wrangler d1 create psc-tracks

# R2 bucket binding
[[r2_buckets]]
binding = "PSC_AUDIO"
bucket_name = "psc-audio"

# Environment variables
[vars]
# R2_PUBLIC_URL will be set as a secret
